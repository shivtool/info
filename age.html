<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator – आयु गणक</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   THEME VARIABLES
══════════════════════════════════════ */
:root {
  --bg1:#0f1a14; --bg2:#1a2e20;
  --orb1:rgba(34,197,94,0.22); --orb2:rgba(16,185,129,0.18); --orb3:rgba(134,239,172,0.1);
  --mesh1:rgba(34,197,94,0.28); --mesh2:rgba(16,185,129,0.2); --mesh3:rgba(134,239,172,0.06);
  --accent:#22c55e; --accent2:#4ade80; --accentPale:rgba(34,197,94,0.12);
  --accentBorder:rgba(34,197,94,0.28);
  --card-bg:linear-gradient(145deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02));
  --topline:linear-gradient(90deg,transparent,#22c55e,#4ade80,#22c55e,transparent);
  --cream:#edfff3; --text-muted:rgba(255,255,255,0.42);
  --stat1:#22c55e; --stat2:#f472b6; --stat3:#fbbf24; --stat4:#818cf8;
  --input-bg:rgba(255,255,255,0.06); --input-border:rgba(255,255,255,0.1);
  --btn-text:#052e16;
  --btn-bg:linear-gradient(135deg,#22c55e 0%,#4ade80 50%,#22c55e 100%);
  --btn-shadow:rgba(34,197,94,0.3);
  --speak-color:#22c55e; --speak-border:rgba(34,197,94,0.35);
  --bday-bg:linear-gradient(135deg,rgba(34,197,94,0.1),rgba(34,197,94,0.04));
  --bday-border:rgba(34,197,94,0.22); --bday-val:#4ade80;
  --divider:rgba(255,255,255,0.07);
  --result-bg:rgba(255,255,255,0.04);
}

[data-theme="dark"] {
  --bg1:#0a0a0f; --bg2:#1a0a2e;
  --orb1:rgba(124,58,237,0.2); --orb2:rgba(45,181,163,0.18); --orb3:rgba(201,168,76,0.14);
  --mesh1:rgba(124,58,237,0.32); --mesh2:rgba(45,181,163,0.22); --mesh3:rgba(201,168,76,0.07);
  --accent:#a78bfa; --accent2:#c4b5fd; --accentPale:rgba(167,139,250,0.1);
  --accentBorder:rgba(167,139,250,0.25);
  --topline:linear-gradient(90deg,transparent,#a78bfa,#c4b5fd,#a78bfa,transparent);
  --cream:#fdf8f0; --text-muted:rgba(255,255,255,0.38);
  --stat1:#2db5a3; --stat2:#e8547a; --stat3:#c9a84c; --stat4:#7c3aed;
  --btn-text:#0a0014;
  --btn-bg:linear-gradient(135deg,#7c3aed 0%,#a78bfa 50%,#7c3aed 100%);
  --btn-shadow:rgba(124,58,237,0.35);
  --speak-color:#2db5a3; --speak-border:rgba(45,181,163,0.35);
  --bday-bg:linear-gradient(135deg,rgba(232,84,122,0.1),rgba(232,84,122,0.04));
  --bday-border:rgba(232,84,122,0.22); --bday-val:#e8547a;
}

[data-theme="golden"] {
  --bg1:#110c02; --bg2:#1e1504;
  --orb1:rgba(201,168,76,0.22); --orb2:rgba(240,160,60,0.16); --orb3:rgba(253,230,138,0.1);
  --mesh1:rgba(201,168,76,0.3); --mesh2:rgba(240,160,60,0.18); --mesh3:rgba(253,230,138,0.06);
  --accent:#c9a84c; --accent2:#f0d080; --accentPale:rgba(201,168,76,0.1);
  --accentBorder:rgba(201,168,76,0.3);
  --topline:linear-gradient(90deg,transparent,#c9a84c,#f0d080,#c9a84c,transparent);
  --cream:#fdf8e8; --text-muted:rgba(255,248,200,0.38);
  --stat1:#f0d080; --stat2:#f97316; --stat3:#22c55e; --stat4:#e879f9;
  --btn-text:#1c0f00;
  --btn-bg:linear-gradient(135deg,#c9a84c 0%,#f0d080 50%,#c9a84c 100%);
  --btn-shadow:rgba(201,168,76,0.4);
  --speak-color:#f0d080; --speak-border:rgba(240,208,128,0.35);
  --bday-bg:linear-gradient(135deg,rgba(240,208,128,0.12),rgba(201,168,76,0.04));
  --bday-border:rgba(201,168,76,0.25); --bday-val:#f0d080;
}

/* ══ RESET & BASE ══ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Outfit',sans-serif;
  background:linear-gradient(160deg,var(--bg1),var(--bg2));
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  overflow-x:hidden; padding:20px;
  transition:background 0.5s ease;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 10%, var(--mesh1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 85%, var(--mesh2) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, var(--mesh3) 0%, transparent 70%);
  z-index:0;
  transition:background 0.5s;
  animation:meshShift 14s ease-in-out infinite alternate;
}
@keyframes meshShift { from{filter:hue-rotate(0deg)} to{filter:hue-rotate(18deg)} }

.orb { position:fixed; border-radius:50%; filter:blur(60px); pointer-events:none; z-index:0; animation:orbFloat 9s ease-in-out infinite alternate; transition:background 0.5s; }
.orb-1 { width:280px;height:280px; background:var(--orb1); top:-70px;left:-70px; animation-duration:9s; }
.orb-2 { width:200px;height:200px; background:var(--orb2); bottom:8%;right:-60px; animation-duration:11s;animation-delay:2s; }
.orb-3 { width:140px;height:140px; background:var(--orb3); top:55%;left:4%; animation-duration:13s;animation-delay:4s; }
@keyframes orbFloat { from{transform:translateY(0) scale(1)} to{transform:translateY(28px) scale(1.08)} }

/* ══ THEME SWITCHER ══ */
.theme-bar {
  position:fixed; top:16px; right:16px; z-index:100;
  display:flex; gap:8px; align-items:center;
  background:rgba(0,0,0,0.35); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:50px; padding:6px 10px;
}

.theme-label {
  font-size:0.65rem; font-weight:600; letter-spacing:0.1em;
  text-transform:uppercase; color:rgba(255,255,255,0.35);
  margin-right:2px;
}

.t-btn {
  width:28px;height:28px; border-radius:50%; border:2px solid transparent;
  cursor:pointer; transition:all 0.25s ease; position:relative;
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem; font-weight:700; font-family:'Outfit',sans-serif;
}
.t-btn:hover { transform:scale(1.15); }
.t-btn.active { border-color:rgba(255,255,255,0.6); box-shadow:0 0 10px rgba(255,255,255,0.3); }

.t-mint   { background:linear-gradient(135deg,#22c55e,#4ade80); color:#052e16; }
.t-dark   { background:linear-gradient(135deg,#7c3aed,#a78bfa); color:#fff; }
.t-golden { background:linear-gradient(135deg,#c9a84c,#f0d080); color:#1c0f00; }

/* ══ CARD ══ */
.card {
  position:relative; z-index:1;
  width:100%; max-width:520px;
  background:var(--card-bg);
  backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:28px;
  padding:50px 44px 44px;
  box-shadow:0 40px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset, 0 1px 0 rgba(255,255,255,0.12) inset;
  animation:cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(40px) scale(0.97)} to{opacity:1;transform:none} }

.card::before {
  content:''; position:absolute;
  top:0;left:10%;right:10%;height:2px;
  background:var(--topline);
  border-radius:0 0 4px 4px;
  transition:background 0.5s;
}

/* ══ HEADER ══ */
.header { text-align:center; margin-bottom:36px; }

.cake-icon {
  display:inline-flex; align-items:center; justify-content:center;
  width:70px;height:70px;
  background:var(--accentPale);
  border:1px solid var(--accentBorder);
  border-radius:20px; font-size:1.9rem; margin-bottom:16px;
  animation:iconPop 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  box-shadow:0 8px 24px var(--accentBorder);
  transition:all 0.4s ease;
}
@keyframes iconPop { from{opacity:0;transform:scale(0.5) rotate(-10deg)} to{opacity:1;transform:none} }

.title {
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,4vw,2.4rem); font-weight:900;
  color:var(--cream); letter-spacing:-0.02em; line-height:1.1;
  animation:fadeUp 0.7s ease 0.4s both;
}
.title span {
  background:var(--topline);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.subtitle {
  color:var(--text-muted); font-size:0.8rem; letter-spacing:0.12em;
  text-transform:uppercase; margin-top:6px; font-weight:500;
  animation:fadeUp 0.7s ease 0.5s both;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

/* ══ INPUT ══ */
.input-group { margin-bottom:26px; animation:fadeUp 0.7s ease 0.6s both; }
.input-label {
  display:block; color:var(--text-muted); font-size:0.76rem;
  font-weight:600; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:9px;
}
.input-wrap { position:relative; }
.input-wrap svg { position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--accent);pointer-events:none;opacity:0.7; }

input[type="date"] {
  width:100%; padding:15px 15px 15px 46px;
  background:var(--input-bg); border:1px solid var(--input-border);
  border-radius:13px; font-family:'Outfit',sans-serif;
  font-size:1rem; font-weight:500; color:var(--cream);
  transition:all 0.3s ease; cursor:pointer;
  appearance:none; -webkit-appearance:none;
}
input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(1) opacity(0.35); cursor:pointer; }
input[type="date"]:hover { border-color:var(--accentBorder); background:rgba(255,255,255,0.08); }
input[type="date"]:focus { outline:none; border-color:var(--accent); background:var(--accentPale); box-shadow:0 0 0 4px var(--accentBorder); }

/* ══ CALC BUTTON ══ */
.calc-btn {
  width:100%; padding:16px;
  background:var(--btn-bg); background-size:200% 100%;
  color:var(--btn-text);
  border:none; border-radius:13px;
  font-family:'Outfit',sans-serif; font-size:1rem; font-weight:700;
  letter-spacing:0.04em; cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 8px 24px var(--btn-shadow), 0 2px 4px rgba(0,0,0,0.2);
  animation:fadeUp 0.7s ease 0.7s both;
  position:relative; overflow:hidden;
}
.calc-btn::after {
  content:''; position:absolute; top:0;left:-100%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
  transition:left 0.5s ease;
}
.calc-btn:hover { transform:translateY(-2px); box-shadow:0 14px 32px var(--btn-shadow); background-position:100% 0; }
.calc-btn:hover::after { left:150%; }
.calc-btn:active { transform:translateY(0); }

/* ══ RESULTS ══ */
.results {
  margin-top:28px; opacity:0; transform:translateY(18px);
  transition:all 0.6s cubic-bezier(0.22,1,0.36,1); pointer-events:none;
}
.results.visible { opacity:1; transform:none; pointer-events:auto; }

.divider {
  height:1px; margin:0 0 22px;
  background:linear-gradient(90deg,transparent,var(--divider),transparent);
}

/* Age Hero */
.age-hero {
  text-align:center; padding:26px 18px; margin-bottom:18px;
  background:var(--accentPale); border:1px solid var(--accentBorder);
  border-radius:20px; position:relative; overflow:hidden;
}
.age-hero::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 0%, var(--accentBorder), transparent 70%);
}
.age-label {
  font-size:0.7rem; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--accent); margin-bottom:9px; opacity:0.85;
}
.age-number {
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,5vw,2.8rem); font-weight:900; color:var(--cream); line-height:1.1;
}
.age-number span {
  font-size:0.42em; font-weight:400; color:rgba(255,255,255,0.45);
  font-family:'Outfit',sans-serif; margin-left:3px;
}

/* Stats */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:14px; }

.stat-card {
  background:var(--result-bg); border:1px solid rgba(255,255,255,0.07);
  border-radius:15px; padding:16px 14px; text-align:center;
  transition:all 0.25s ease; position:relative; overflow:hidden;
}
.stat-card:hover { background:rgba(255,255,255,0.07); transform:translateY(-2px); }
.stat-card::after { content:''; position:absolute; bottom:0;left:0;right:0;height:2px; }
.stat-card.s1::after { background:linear-gradient(90deg,transparent,var(--stat1),transparent); }
.stat-card.s2::after { background:linear-gradient(90deg,transparent,var(--stat2),transparent); }
.stat-card.s3::after { background:linear-gradient(90deg,transparent,var(--stat3),transparent); }
.stat-card.s4::after { background:linear-gradient(90deg,transparent,var(--stat4),transparent); }

.stat-icon { font-size:1.25rem; margin-bottom:7px; }
.stat-val {
  font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700;
  color:var(--cream); display:block; line-height:1; margin-bottom:4px;
}
.stat-lbl { font-size:0.68rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.3); }

/* Born row */
.born-row {
  display:flex; align-items:center; gap:12px;
  padding:15px 17px;
  background:var(--result-bg); border:1px solid rgba(255,255,255,0.06);
  border-radius:13px; margin-bottom:13px;
}
.born-dot { width:9px;height:9px; border-radius:50%; background:var(--accent); flex-shrink:0; box-shadow:0 0 8px var(--accent); }
.born-label { font-size:0.7rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:2px; }
.born-date { color:var(--cream); font-size:0.87rem; font-weight:500; }

/* Birthday row */
.bday-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:15px 17px;
  background:var(--bday-bg); border:1px solid var(--bday-border);
  border-radius:13px; margin-bottom:18px;
}
.bday-left { display:flex; align-items:center; gap:10px; }
.bday-emoji { font-size:1.3rem; }
.bday-text { font-size:0.76rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:rgba(255,255,255,0.4); }
.bday-sub  { font-size:0.72rem; color:rgba(255,255,255,0.28); margin-top:2px; }
.bday-days { font-family:'Playfair Display',serif; font-size:1.55rem; font-weight:700; color:var(--bday-val); }

/* ══ SPEAK BUTTON ══ */
.speak-btn {
  width:100%; padding:14px;
  background:transparent; border:1px solid var(--speak-border);
  border-radius:13px; color:var(--speak-color);
  font-family:'Outfit',sans-serif; font-size:0.9rem; font-weight:600;
  letter-spacing:0.05em; cursor:pointer;
  transition:all 0.3s ease;
  display:flex; align-items:center; justify-content:center; gap:9px;
}
.speak-btn:hover {
  background:var(--accentPale); border-color:var(--accent);
  box-shadow:0 0 18px var(--accentBorder);
}
.speak-btn.active {
  background:var(--accentPale);
  animation:pulseSpeakBtn 1.5s ease-in-out infinite;
}
@keyframes pulseSpeakBtn {
  0%,100%{ box-shadow:0 0 0 0 var(--btn-shadow); }
  50%    { box-shadow:0 0 0 8px transparent; }
}

/* Sound wave animation inside button */
.wave-bars {
  display:none; align-items:flex-end; gap:2px; height:16px;
}
.wave-bars.show { display:flex; }
.wave-bars span {
  display:block; width:3px; background:var(--accent); border-radius:2px;
  animation:waveBar 0.6s ease-in-out infinite alternate;
}
.wave-bars span:nth-child(1){ height:4px; animation-delay:0s; }
.wave-bars span:nth-child(2){ height:10px; animation-delay:0.1s; }
.wave-bars span:nth-child(3){ height:16px; animation-delay:0.2s; }
.wave-bars span:nth-child(4){ height:10px; animation-delay:0.3s; }
.wave-bars span:nth-child(5){ height:4px; animation-delay:0.4s; }
@keyframes waveBar { from{transform:scaleY(0.5)} to{transform:scaleY(1)} }

/* ══ CONFETTI CANVAS ══ */
#confettiCanvas {
  position:fixed; inset:0; z-index:999; pointer-events:none;
  display:none;
}

/* ══ BIRTHDAY OVERLAY ══ */
.bday-overlay {
  position:fixed; inset:0; z-index:998;
  display:none; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.65); backdrop-filter:blur(6px);
  animation:overlayIn 0.4s ease;
}
.bday-overlay.show { display:flex; }
@keyframes overlayIn { from{opacity:0} to{opacity:1} }

.bday-modal {
  background:linear-gradient(145deg,var(--bg2),var(--bg1));
  border:1px solid var(--accentBorder);
  border-radius:28px; padding:48px 36px;
  text-align:center; max-width:380px; width:90%;
  box-shadow:0 40px 80px rgba(0,0,0,0.7);
  animation:modalPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
}
@keyframes modalPop { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }

.bday-emoji-big {
  font-size:4rem; display:block; margin-bottom:16px;
  animation:bounce 0.8s ease-in-out infinite alternate;
}
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }

.bday-title {
  font-family:'Playfair Display',serif; font-size:2rem; font-weight:900;
  color:var(--cream); margin-bottom:10px; line-height:1.1;
}
.bday-title span { color:var(--accent); }

.bday-msg { color:var(--text-muted); font-size:0.95rem; line-height:1.6; margin-bottom:24px; }

.bday-close {
  padding:12px 32px;
  background:var(--btn-bg); color:var(--btn-text);
  border:none; border-radius:12px;
  font-family:'Outfit',sans-serif; font-size:0.9rem; font-weight:700;
  cursor:pointer; transition:all 0.25s ease;
  box-shadow:0 6px 20px var(--btn-shadow);
}
.bday-close:hover { transform:translateY(-2px); }

/* ══ RESPONSIVE ══ */
@media(max-width:480px){
  .card{ padding:32px 20px 28px; }
  .stats-grid{ gap:9px; }
  .stat-val{ font-size:1.15rem; }
  .theme-bar{ top:10px;right:10px;padding:5px 8px; gap:6px; }
  .t-btn{ width:24px;height:24px; }
}

/* Shake keyframe */
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
</style>
</head>
<body data-theme="mint">

<!-- Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Confetti canvas -->
<canvas id="confettiCanvas"></canvas>

<!-- Birthday overlay -->
<div class="bday-overlay" id="bdayOverlay">
  <div class="bday-modal">
    <span class="bday-emoji-big">🎂</span>
    <div class="bday-title">जन्मदिन <span>मुबारक!</span></div>
    <div class="bday-msg" id="bdayModalMsg">आज आपका जन्मदिन है!<br>ईश्वर आपकी सभी मनोकामनाएं पूरी करें।<br>खूब खुश रहें! 🎉🎊✨</div>
    <button class="bday-close" onclick="closeBdayOverlay()">धन्यवाद! 🙏</button>
  </div>
</div>

<!-- Theme bar -->
<div class="theme-bar">
  <span class="theme-label">Theme</span>
  <button class="t-btn t-mint active"  onclick="setTheme('mint')"  title="Mint">M</button>
  <button class="t-btn t-dark"         onclick="setTheme('dark')"  title="Dark">D</button>
  <button class="t-btn t-golden"       onclick="setTheme('golden')" title="Golden">G</button>
</div>

<!-- Card -->
<div class="card">
  <div class="header">
    <div class="cake-icon">🎂</div>
    <h1 class="title">Age <span>Calculator</span></h1>
    <p class="subtitle">आयु गणक • Know Your Journey</p>
  </div>

  <div class="input-group">
    <label class="input-label" for="birthDate">जन्म तिथि चुनें</label>
    <div class="input-wrap">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <input type="date" id="birthDate" required>
    </div>
  </div>

  <button class="calc-btn" onclick="calculateAge()">✦ &nbsp;आयु की गणना करें&nbsp; ✦</button>

  <!-- Results -->
  <div class="results" id="results">
    <div class="divider"></div>

    <div class="age-hero">
      <div class="age-label">✦ आपकी वर्तमान आयु ✦</div>
      <div class="age-number" id="ageMain">—</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card s1">
        <div class="stat-icon">📅</div>
        <span class="stat-val" id="totalDays">—</span>
        <span class="stat-lbl">कुल दिन</span>
      </div>
      <div class="stat-card s2">
        <div class="stat-icon">🗓️</div>
        <span class="stat-val" id="totalWeeks">—</span>
        <span class="stat-lbl">कुल सप्ताह</span>
      </div>
      <div class="stat-card s3">
        <div class="stat-icon">🌙</div>
        <span class="stat-val" id="totalMonths">—</span>
        <span class="stat-lbl">कुल माह</span>
      </div>
      <div class="stat-card s4">
        <div class="stat-icon">⏰</div>
        <span class="stat-val" id="totalHours">—</span>
        <span class="stat-lbl">कुल घंटे (हज़ार)</span>
      </div>
    </div>

    <div class="born-row">
      <div class="born-dot"></div>
      <div>
        <div class="born-label">जन्म हुआ था</div>
        <div class="born-date" id="bornDate">—</div>
      </div>
    </div>

    <div class="bday-row">
      <div class="bday-left">
        <div class="bday-emoji">🎉</div>
        <div>
          <div class="bday-text">अगला जन्मदिन</div>
          <div class="bday-sub">दिनों में</div>
        </div>
      </div>
      <div class="bday-days" id="bdayCount">—</div>
    </div>

    <!-- SPEAK BUTTON — manual only -->
    <button class="speak-btn" id="speakBtn" onclick="toggleSpeak()">
      <span id="speakIcon">🔊</span>
      <div class="wave-bars" id="waveBars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span id="speakText">हिंदी में सुनें</span>
    </button>
  </div>
</div>

<script>
/* ══ THEME ══ */
function setTheme(t) {
  document.body.setAttribute('data-theme', t);
  document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.t-'+t).classList.add('active');
}

/* ══ CALCULATE ══ */
function calculateAge() {
  const val = document.getElementById('birthDate').value;
  if (!val) { shakeInput(); return; }

  const birth = new Date(val);
  const today = new Date();

  let y = today.getFullYear() - birth.getFullYear();
  let m = today.getMonth()    - birth.getMonth();
  let d = today.getDate()     - birth.getDate();
  if (d < 0) { m--; d += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
  if (m < 0) { y--; m += 12; }

  const diff   = today - birth;
  const tDays  = Math.floor(diff / 86400000);
  const tWeeks = Math.floor(tDays / 7);
  const tMonths= y * 12 + m;
  const tHours = Math.floor(diff / 3600000);

  let next = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
  if (next < today) next.setFullYear(today.getFullYear() + 1);
  const bdayDays = Math.ceil((next - today) / 86400000);
  const isBirthday = (birth.getMonth() === today.getMonth() && birth.getDate() === today.getDate());

  // Fill
  document.getElementById('ageMain').innerHTML =
    `${y}<span>वर्ष</span> &nbsp;${m}<span>माह</span> &nbsp;${d}<span>दिन</span>`;

  document.getElementById('totalDays').textContent  = tDays.toLocaleString('hi-IN');
  document.getElementById('totalWeeks').textContent = tWeeks.toLocaleString('hi-IN');
  document.getElementById('totalMonths').textContent= tMonths.toLocaleString('hi-IN');
  document.getElementById('totalHours').textContent = (tHours/1000).toFixed(1)+'K';

  document.getElementById('bornDate').textContent =
    birth.toLocaleDateString('hi-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  document.getElementById('bdayCount').textContent = isBirthday ? '🎂 आज!' : bdayDays;

  // Show results (NO auto-speak)
  const res = document.getElementById('results');
  res.classList.add('visible');
  setTimeout(() => res.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);

  // Birthday animation
  if (isBirthday) {
    setTimeout(() => {
      document.getElementById('bdayOverlay').classList.add('show');
      document.getElementById('confettiCanvas').style.display = 'block';
      startConfetti();
    }, 500);
  }
}

/* ══ SHAKE ══ */
function shakeInput() {
  const inp = document.getElementById('birthDate');
  inp.style.animation = 'none'; inp.offsetHeight;
  inp.style.animation = 'shake 0.4s ease';
  inp.style.borderColor = '#e8547a';
  setTimeout(() => { inp.style.borderColor = ''; inp.style.animation = ''; }, 700);
}

/* ══ SPEAK — manual button only ══ */
function toggleSpeak() {
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel(); setSpeakIdle();
  } else {
    doSpeak();
  }
}

function doSpeak() {
  const val = document.getElementById('birthDate').value;
  if (!val) return;

  const birth = new Date(val), today = new Date();
  let y = today.getFullYear()-birth.getFullYear();
  let m = today.getMonth()-birth.getMonth();
  let d = today.getDate()-birth.getDate();
  if (d < 0){ m--; d += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
  if (m < 0){ y--; m += 12; }
  const tDays = Math.floor((today-birth)/86400000);
  let next = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
  if (next < today) next.setFullYear(today.getFullYear()+1);
  const bDays = Math.ceil((next-today)/86400000);
  const isBday = (birth.getMonth()===today.getMonth() && birth.getDate()===today.getDate());

  let text = isBday
    ? `जन्मदिन मुबारक हो! आज आपका जन्मदिन है। ईश्वर आपको दीर्घायु करें। आपकी आयु ${y} साल हो गई है।`
    : `आपकी आयु की गणना तैयार हो चुकी है। कृपया ध्यान से सुनिए।
       आपकी वर्तमान आयु ${y} साल, ${m} महीने, और ${d} दिन है।
       आपने इस धरती पर कुल ${tDays.toLocaleString('hi-IN')} दिन बिताए हैं।
       आपका अगला जन्मदिन ${bDays} दिनों में है।
       आपका जन्म ${birth.toLocaleDateString('hi-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})} को हुआ था।
       आपका दिन शुभ और मंगलमय रहे। धन्यवाद।`;

  if (!('speechSynthesis' in window)) { alert('आपके ब्राउज़र में आवाज़ उपलब्ध नहीं है।'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='hi-IN'; u.rate=0.82; u.pitch=1.05; u.volume=1;
  u.onstart = () => {
    document.getElementById('speakBtn').classList.add('active');
    document.getElementById('speakIcon').style.display = 'none';
    document.getElementById('waveBars').classList.add('show');
    document.getElementById('speakText').textContent = 'बोलना बंद करें';
  };
  u.onend = u.onerror = setSpeakIdle;
  speechSynthesis.speak(u);
}

function setSpeakIdle() {
  document.getElementById('speakBtn').classList.remove('active');
  document.getElementById('speakIcon').style.display = '';
  document.getElementById('waveBars').classList.remove('show');
  document.getElementById('speakText').textContent = 'हिंदी में सुनें';
}

/* ══ BIRTHDAY OVERLAY ══ */
function closeBdayOverlay() {
  document.getElementById('bdayOverlay').classList.remove('show');
  stopConfetti();
  document.getElementById('confettiCanvas').style.display = 'none';
}

/* ══ CONFETTI ══ */
let confettiAnim = null;
const COLORS = ['#22c55e','#f472b6','#fbbf24','#818cf8','#f97316','#c4b5fd','#4ade80','#fb7185','#facc15'];

function startConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const pieces = Array.from({length:140}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    r: Math.random()*6+3,
    d: Math.random()*2+1,
    color: COLORS[Math.floor(Math.random()*COLORS.length)],
    tilt: Math.random()*12-6,
    tiltAngle: 0,
    tiltSpeed: Math.random()*0.05+0.02,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    w: Math.random()*8+4,
    h: Math.random()*14+6,
    rot: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-0.5)*0.1,
  }));

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.88;
      if (p.shape === 'circle') {
        ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      }
      ctx.restore();
      p.y  += p.d + 1.2;
      p.x  += Math.sin(p.tiltAngle) * 1.5;
      p.rot+= p.rotSpeed;
      p.tiltAngle += p.tiltSpeed;
      if (p.y > canvas.height) {
        p.y = -10;
        p.x = Math.random() * canvas.width;
      }
    });
    confettiAnim = requestAnimationFrame(draw);
  }
  draw();

  // Auto-stop after 6s
  setTimeout(stopConfetti, 6000);
}

function stopConfetti() {
  if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
  const c = document.getElementById('confettiCanvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

/* ══ INIT ══ */
document.getElementById('birthDate').max = new Date().toISOString().split('T')[0];
document.getElementById('birthDate').addEventListener('keydown', e => { if(e.key==='Enter') calculateAge(); });
window.addEventListener('resize', () => {
  const c = document.getElementById('confettiCanvas');
  if (c.style.display !== 'none') { c.width = innerWidth; c.height = innerHeight; }
});
</script>
</body>
</html>
