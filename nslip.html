<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Name Slip Maker | Shiv Computer</title>

<link href="https://fonts.google.com/share?selection.family=Roboto+Slab:wght@100..900" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* Prevent header/footer jump */
body{
    overflow-x:hidden;
}
        :root {
            --bg-color: #f1f5f9; --surface-color: #ffffff; --text-primary: #0f172a; --text-secondary: #475569;
            --primary-color: #4f46e5; --border-color: #cbd5e1; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            /* Mathematically calculated sizes for 10 slips on A4 */
            --slip-width: 320px; --slip-height: 195px; 
        }
        [data-theme="dark"] {
            --bg-color: #0f172a; --surface-color: #1e293b; --text-primary: #f8fafc; --text-secondary: #94a3b8; --border-color: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto Slab', serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); scroll-behavior: smooth; }

        /* Dashboard Header */
        header { background: var(--primary-color); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .logo a { color: white; text-decoration: none; font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .header-btns { display: flex; gap: 10px; }
        .btn-theme { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .btn-theme:hover { background: rgba(255,255,255,0.3); }

        /* Main Container */
        .app-container { display: grid; grid-template-columns: 380px 1fr; gap: 30px; padding: 30px 5%; max-width: 1600px; margin: 0 auto; }

        /* Modern Sidebar */
        .controls-panel { background: var(--surface-color); padding: 25px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border-color); height: fit-content; }
        .panel-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; color: var(--primary-color); border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; }
        
        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"], select, input[type="range"] { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-color); color: var(--text-primary); transition: 0.3s; outline: none; }
        input[type="text"]:focus, input[type="number"]:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* Theme Selector */
        .template-selector { display: flex; gap: 10px; }
        .template-card { flex: 1; border: 2px solid var(--border-color); border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; font-weight: 600; transition: 0.3s; background: var(--bg-color); }
        .template-card.active { border-color: var(--primary-color); background: rgba(79, 70, 229, 0.1); color: var(--primary-color); }
        .template-card input { display: none; }

        /* File Uploaders */
        .upload-box { border: 2px dashed var(--primary-color); padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--primary-color); background: rgba(79, 70, 229, 0.05); transition: 0.3s; }
        .upload-box:hover { background: rgba(79, 70, 229, 0.1); }
        
        .cartoon-controls { background: var(--bg-color); padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); display: none; margin-top: 10px; }

        /* Action Buttons */
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-print { background: var(--primary-color); color: white; grid-column: span 2; font-size: 1rem; }
        .btn-print:hover { background: #4338ca; }
        .btn-pdf { background: #ef4444; color: white; }
        .btn-pdf:hover { background: #dc2626; }
        .btn-png { background: #10b981; color: white; }
        .btn-png:hover { background: #059669; }
        .btn-lang { background: #f59e0b; color: white; grid-column: span 2; }

        /* Preview Section */
        .preview-section { background: var(--surface-color); padding: 25px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 30px; border: 1px solid var(--border-color); }
        .preview-section h3 { font-size: 1.2rem; margin-bottom: 20px; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
        
        .slip-container { display: flex; justify-content: center; padding: 30px; background: repeating-conic-gradient(#cbd5e1 0% 25%, transparent 0% 50%) 50% / 20px 20px; border-radius: 12px; }
        
        /* The Actual Slip Design */
        .slip-card { 
            width: var(--slip-width); height: var(--slip-height); background: white; border-radius: 8px; 
            position: relative; overflow: hidden; display: flex; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            border: 1px solid #e2e8f0; page-break-inside: avoid;
        }

        .slip-boy { background: #fffdf5; border: 2px dashed #fcd34d; }
        .slip-boy::before { content: ''; position: absolute; right: 0; top: 0; width: 55%; height: 100%; background: linear-gradient(135deg, #fef08a, #facc15); clip-path: polygon(25% 0, 100% 0, 100% 100%, 0 100%); }
        .slip-girl { background: #f8fafc; border: 2px solid #a5b4fc; }
        .slip-girl::before { content: ''; position: absolute; right: -10%; top: -10%; width: 70%; height: 120%; background: radial-gradient(circle, #e0e7ff, #c7d2fe); border-radius: 50%; }

        .slip-content { position: relative; z-index: 2; display: flex; width: 100%; padding: 12px 15px; gap: 12px; align-items: center; }
        .photo-frame { width: 80px; height: 100px; background: #e2e8f0; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.15); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .slip-girl .photo-frame { border-radius: 50%; width: 90px; height: 90px; }
        /* Object-position top center ensures face is always visible and recognizable */
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }

        .text-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .name-txt { font-size: 22px; margin-bottom: 6px; color: #000; font-weight: 700; line-height: 1.1; word-break: break-word; }
        .detail-row { display: flex; align-items: flex-end; gap: 5px; margin-bottom: 5px; }
        .detail-row span { font-size: 11px; font-weight: 700; color: #334155; white-space: nowrap; }
        .detail-row div { flex-grow: 1; border-bottom: 1px dotted #64748b; height: 10px; }

        .school-tag { position: absolute; bottom: 6px; right: 10px; font-size: 9px; font-weight: 800; color: white; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 12px; z-index: 3; text-transform: uppercase; }

        .cartoon-element { position: absolute; z-index: 4; pointer-events: none; }
        .cartoon-element img { width: 100%; height: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

        /* A4 Layout View - Perfectly Math Calculated */
        .a4-wrapper { background: #94a3b8; padding: 20px; display: flex; justify-content: center; border-radius: 12px; overflow-y: auto; max-height: 600px; }
        .a4-preview { 
            width: 210mm; min-height: 297mm; background: white; padding: 8mm 5mm; 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 5mm; 
            align-content: start; justify-items: center; box-shadow: 0 0 15px rgba(0,0,0,0.2);
            transform: scale(0.6); transform-origin: top center; margin-bottom: -110mm;
        }

        footer { text-align: center; padding: 25px; background: var(--surface-color); color: var(--text-secondary); border-top: 1px solid var(--border-color); }

        /* --- PRINT CSS: THE SECRET TO PERFECT A4 PRINT --- */
        @media print {
            body * { visibility: hidden; }
            #a4-print, #a4-print * { visibility: visible; }
            #a4-print { 
                position: absolute; left: 0; top: 0; margin: 0; padding: 5mm; 
                transform: none !important; width: 210mm; height: 297mm; 
                box-shadow: none; display: grid; grid-template-columns: repeat(2, 1fr); 
                gap: 5mm; align-content: start; justify-items: center; background: white;
            }
            .slip-card { border: 1px solid #94a3b8; }
            @page { size: A4 portrait; margin: 0; }
        }

        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
            .a4-preview { transform: scale(0.4); margin-bottom: -160mm; }
        }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo">
            <a href="#">🖥️ Shiv Computer</a>
        </div>
        <div class="logo">
            <a href="#">Name Slip Maker</a>
        </div>
        <div class="header-btns">
            <button class="btn-theme" onclick="toggleTheme()">🌙 Dark Mode</button>
        </div>
    </header>

    <div class="app-container">
        <aside class="controls-panel">
            <div class="panel-title">⚙️ Design Settings</div>

            <div class="control-group">
                <label>1. Select Theme</label>
                <div class="template-selector">
                    <label class="template-card" id="cardBoy">
                        <input type="radio" name="tpl" value="boy" checked="" onchange="updateUI()"> 👦 Boy Style
                    </label>
                    <label class="template-card active" id="cardGirl">
                        <input type="radio" name="tpl" value="girl" onchange="updateUI()"> 👧 Girl Style
                    </label>
                </div>
            </div>

            <div class="control-group">
                <label>2. Number of Copies</label>
                <input type="number" id="qtyInput" min="1" max="10" value="10" oninput="updateUI()">
            </div>

            <div class="control-group">
                <label>3. Upload Photo (Recognizable Face)</label>
                <div class="upload-box" onclick="document.getElementById('fileIn').click()">📸 Click to Upload Student Photo</div>
                <input type="file" id="fileIn" hidden="" accept="image/*" onchange="loadImage(event, 'student')">
            </div>

            <div class="control-group">
                <label>4. Add Cartoon (Optional)</label>
                <div class="upload-box" style="border-color:#10b981; color:#10b981;" onclick="document.getElementById('cartIn').click()">🧸 Upload Cartoon PNG</div>
                <input type="file" id="cartIn" hidden="" accept="image/png" onchange="loadImage(event, 'cartoon')">
            </div>

            <div id="cartoonControls" class="cartoon-controls" style="display: block;">
                <label style="color:var(--primary-color); font-size:12px; margin-bottom:10px;">Adjust Cartoon Alignment</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label style="font-size:10px;">Size</label><input type="range" id="cartSize" min="30" max="180" value="90" oninput="updateUI()"></div>
                    <div><label style="font-size:10px;">Up/Down</label><input type="range" id="cartY" min="-50" max="200" value="70" oninput="updateUI()"></div>
                    <div style="grid-column: span 2;"><label style="font-size:10px;">Left/Right Position</label><input type="range" id="cartX" min="-50" max="300" value="190" oninput="updateUI()"></div>
                </div>
            </div>

            <div class="control-group" style="margin-top: 15px;">
                <label>5. Student Information</label>
                <input type="text" id="nameIn" placeholder="Enter Student Name" oninput="updateUI()" value="Shiv Kumar">
                <input type="text" id="schoolIn" placeholder="Enter School Name" oninput="updateUI()" style="margin-top:8px" value="SHIV COMPUTER">
            </div>

            <div class="action-btns">
                <button class="btn btn-lang" onclick="toggleLanguage()" id="langBtn">🔄 Switch to Hindi Labels</button>
                <button class="btn btn-print" onclick="window.print()">🖨️ Direct Print A4</button>
                <button class="btn btn-png" onclick="downloadPNG()">🖼️ Download Single PNG</button>
                <button class="btn btn-pdf" id="btnPdf" onclick="saveAsPDF()">💾 Save as PDF</button>
            </div>
        </aside>

        <main>
            <section class="preview-section">
                <h3>Live Preview</h3>
                <div class="slip-container">
                    <div id="master-slip" class="slip-card slip-girl">
                        <div id="cartoonSticker" class="cartoon-element" style="display: none;">
                            <img id="cartImg" src="" alt="cartoon">
                        </div>
                        <div class="slip-content">
                            <div class="photo-frame">
                                <img id="stuImg" src="" alt="student photo" style="display:none;">
                                <div id="stuPlace" style="padding: 10px; color: rgb(148, 163, 184); font-size: 11px; text-align: center; font-weight: 600; display: flex;">ADD PHOTO</div>
                            </div>
                            <div class="text-info">
                                <div id="slipName" class="name-txt" style="font-family:'Roboto+Slab';">Student Name</div>
                                <div class="detail-row"><span class="lbl-cls">Class:</span><div></div></div>
                                <div class="detail-row"><span class="lbl-sec">Sec:</span><div style="flex-grow:0.4"></div><span class="lbl-rol">Roll:</span><div></div></div>
                                <div class="detail-row"><span class="lbl-sub">Subject:</span><div></div></div>
                                <div class="detail-row"><span class="lbl-sub">Mobile no:</span><div></div></div>
                            </div>
                        </div>
                        <div class="school-tag" id="slipSchool">YOUR SCHOOL NAME</div>
                    </div>
                </div>
            </section>

            <section class="preview-section" style="overflow:hidden;">
                <h3>📄 A4 Sheet View (10 Slips Perfectly Aligned)</h3>
                <div class="a4-wrapper">
                    <div id="a4-print" class="a4-preview" style="width: 210mm;"></div>
                </div>
            </section>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 Shiv Computer. All Rights Reserved.</p>
    </footer>

    <script>
        let images = { student: null, cartoon: null };
        let isHindi = false;
        const labels = {
            en: { cls: "Class:", sec: "Sec:", rol: "Roll:", sub: "Subject:" },
            hi: { cls: "कक्षा:", sec: "वर्ग:", rol: "रोल:", sub: "विषय:" }
        };

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function toggleLanguage() {
            isHindi = !isHindi;
            document.getElementById('langBtn').innerHTML = isHindi ? "🔄 Switch to English Labels" : "🔄 Switch to Hindi Labels";
            updateUI();
        }

        function updateUI() {
            const tpl = document.querySelector('input[name="tpl"]:checked').value;
            const name = document.getElementById('nameIn').value || 'Student Name';
            const school = document.getElementById('schoolIn').value || 'SCHOOL NAME';
            const qty = Math.min(document.getElementById('qtyInput').value, 10);

            // Update Theme
            document.getElementById('cardBoy').classList.toggle('active', tpl === 'boy');
            document.getElementById('cardGirl').classList.toggle('active', tpl === 'girl');

            const master = document.getElementById('master-slip');
            master.className = `slip-card slip-${tpl}`;
            document.getElementById('slipName').innerText = name;
            document.getElementById('slipSchool').innerText = school;

            // Apply Language
            const lang = isHindi ? 'hi' : 'en';
            master.querySelector('.lbl-cls').innerText = labels[lang].cls;
            master.querySelector('.lbl-sec').innerText = labels[lang].sec;
            master.querySelector('.lbl-rol').innerText = labels[lang].rol;
            master.querySelector('.lbl-sub').innerText = labels[lang].sub;

            // Apply Cartoon Setup
            const sticker = document.getElementById('cartoonSticker');
            if(images.cartoon) {
                sticker.style.display = 'block';
                document.getElementById('cartoonControls').style.display = 'block';
                sticker.style.width = document.getElementById('cartSize').value + 'px';
                sticker.style.left = document.getElementById('cartX').value + 'px';
                sticker.style.top = document.getElementById('cartY').value + 'px';
            }

            // Sync A4 Preview
            const a4 = document.getElementById('a4-print');
            a4.innerHTML = '';
            for(let i=0; i<qty; i++) {
                const clone = master.cloneNode(true);
                clone.removeAttribute('id');
                a4.appendChild(clone);
            }
        }

        function loadImage(event, type) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                if(type === 'student') {
                    images.student = e.target.result;
                    document.getElementById('stuImg').src = e.target.result;
                    document.getElementById('stuImg').style.display = 'block';
                    document.getElementById('stuPlace').style.display = 'none';
                } else {
                    images.cartoon = e.target.result;
                    document.getElementById('cartImg').src = e.target.result;
                }
                updateUI();
            };
            reader.readAsDataURL(file);
        }

        // DOWNLOAD SINGLE PNG FUNCTION
        async function downloadPNG() {
            const master = document.getElementById('master-slip');
            try {
                const canvas = await html2canvas(master, { scale: 3, useCORS: true, backgroundColor: null });
                const link = document.createElement('a');
                link.download = 'ShivComputer_NameSlip.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch(e) {
                alert("Error saving PNG.");
            }
        }

        // FLAWLESS PDF SAVE FUNCTION (No Cut-offs)
        async function saveAsPDF() {
            const btn = document.getElementById('btnPdf');
            btn.innerHTML = "⏳ Generating...";
            const a4 = document.getElementById('a4-print');
            
            // Temporary styles to capture full unscaled A4 without overflow cuts
            const originalTransform = a4.style.transform;
            const originalMargin = a4.style.marginBottom;
            a4.style.transform = 'none';
            a4.style.marginBottom = '0';
            a4.style.position = 'absolute';
            a4.style.top = '0';
            a4.style.left = '0';
            a4.style.width = '210mm';
            a4.style.height = '297mm';

            try {
                const canvas = await html2canvas(a4, { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#ffffff',
                    width: a4.offsetWidth,
                    height: a4.offsetHeight
                });
                
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
                pdf.save('ShivComputer_A4_NameSlips.pdf');
            } catch (error) {
                alert("Error generating PDF.");
            }

            // Revert styles back to preview mode
            a4.style.position = '';
            a4.style.top = '';
            a4.style.left = '';
            a4.style.width = '210mm';
            a4.style.height = '';
            a4.style.transform = originalTransform;
            a4.style.marginBottom = originalMargin;
            btn.innerHTML = "💾 Save as PDF";
        }

        document.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
