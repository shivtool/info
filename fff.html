<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍓 Fruit Puzzle Paradise</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES — THREE THEMES
   ============================================================ */
:root {
  /* MINT (default) */
  --bg-from: #0d3b2e;
  --bg-mid:  #0a4d38;
  --bg-to:   #072a20;
  --accent1: #2dffb4;
  --accent2: #00e5a0;
  --accent3: #5fffcb;
  --tile-bg: rgba(0,255,170,0.10);
  --tile-border: rgba(0,255,170,0.22);
  --tile-shine: rgba(0,255,200,0.18);
  --card-bg: rgba(0,60,40,0.55);
  --card-border: rgba(0,255,160,0.18);
  --score-bg: rgba(0,80,55,0.65);
  --score-border: rgba(0,255,160,0.25);
  --btn1-from: #00c97a; --btn1-to: #00a060; --btn1-shadow: #006640;
  --btn2-from: #1de9b6; --btn2-to: #00bfa5; --btn2-shadow: #007a67;
  --progress-from: #00e5a0; --progress-to: #5fffcb;
  --text-main: #e0fff5;
  --text-dim: rgba(200,255,235,0.55);
  --glow-color: rgba(0,255,170,0.45);
  --panel-bg: rgba(5,35,25,0.97);
  --leaf-color: #2dffb4;
}
[data-theme="dark"] {
  --bg-from: #0a0018;
  --bg-mid:  #100030;
  --bg-to:   #060010;
  --accent1: #b57cff;
  --accent2: #9b5cff;
  --accent3: #d4a8ff;
  --tile-bg: rgba(130,60,255,0.12);
  --tile-border: rgba(160,100,255,0.25);
  --tile-shine: rgba(180,120,255,0.15);
  --card-bg: rgba(20,5,50,0.65);
  --card-border: rgba(160,100,255,0.20);
  --score-bg: rgba(30,8,70,0.70);
  --score-border: rgba(180,120,255,0.30);
  --btn1-from: #7c3aed; --btn1-to: #5b21b6; --btn1-shadow: #3b0d8e;
  --btn2-from: #c026d3; --btn2-to: #9333ea; --btn2-shadow: #6b21a8;
  --progress-from: #b57cff; --progress-to: #ff80d4;
  --text-main: #f0e8ff;
  --text-dim: rgba(220,200,255,0.50);
  --glow-color: rgba(180,120,255,0.45);
  --panel-bg: rgba(8,2,25,0.97);
  --leaf-color: #c084fc;
}
[data-theme="golden"] {
  --bg-from: #1a0a00;
  --bg-mid:  #2d1200;
  --bg-to:   #100800;
  --accent1: #ffd700;
  --accent2: #ffaa00;
  --accent3: #ffe066;
  --tile-bg: rgba(255,200,0,0.10);
  --tile-border: rgba(255,200,0,0.25);
  --tile-shine: rgba(255,230,100,0.18);
  --card-bg: rgba(60,30,0,0.60);
  --card-border: rgba(255,200,0,0.22);
  --score-bg: rgba(80,40,0,0.70);
  --score-border: rgba(255,200,0,0.30);
  --btn1-from: #d97706; --btn1-to: #b45309; --btn1-shadow: #78350f;
  --btn2-from: #f59e0b; --btn2-to: #d97706; --btn2-shadow: #92400e;
  --progress-from: #ffd700; --progress-to: #ffe066;
  --text-main: #fff8e1;
  --text-dim: rgba(255,230,150,0.50);
  --glow-color: rgba(255,200,0,0.45);
  --panel-bg: rgba(20,8,0,0.97);
  --leaf-color: #ffd700;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center;
  overflow-x:hidden;
  position:relative;
  background: radial-gradient(ellipse at 30% 20%, var(--bg-from) 0%, var(--bg-mid) 45%, var(--bg-to) 100%);
  transition: background 0.8s ease, color 0.4s;
  padding:10px 8px 60px;
}

/* ---- CANVAS BACKGROUND ---- */
#bgCanvas {
  position:fixed; inset:0; z-index:0;
  pointer-events:none;
  opacity:0.9;
}

/* ---- THEME SWITCHER ---- */
.theme-bar {
  position:relative; z-index:10;
  display:flex; gap:10px;
  margin-bottom:12px;
  margin-top:8px;
}
.theme-btn {
  padding:7px 18px;
  border-radius:30px;
  border:2px solid transparent;
  font-family:'Fredoka One',cursive;
  font-size:0.88em;
  cursor:pointer;
  transition:all 0.3s;
  background: var(--card-bg);
  color: var(--text-main);
  border-color: var(--card-border);
  backdrop-filter:blur(8px);
}
.theme-btn.active, .theme-btn:hover {
  background: var(--accent1);
  color:#000;
  border-color:transparent;
  transform:scale(1.08);
  box-shadow: 0 4px 18px var(--glow-color);
}

/* ---- MAIN CONTAINER ---- */
.game-container {
  position:relative; z-index:5;
  background: var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:28px;
  padding:22px 18px 24px;
  max-width:96vw; width:600px;
  backdrop-filter:blur(28px) saturate(1.6);
  box-shadow:
    0 0 80px var(--glow-color),
    0 30px 80px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.10),
    inset 0 -1px 0 rgba(0,0,0,0.15);
  transition: background 0.6s, box-shadow 0.6s, border-color 0.6s;
}
.game-container::before {
  content:'';
  position:absolute; top:0; left:8%; right:8%; height:2px;
  background:linear-gradient(90deg,transparent,var(--accent1),var(--accent3),var(--accent2),transparent);
  border-radius:2px;
  animation:topBorder 3s ease-in-out infinite;
}
@keyframes topBorder {
  0%,100%{ opacity:0.6; }
  50%{ opacity:1; filter:blur(1px); }
}

/* ---- TITLE ---- */
.game-title {
  font-family:'Fredoka One',cursive;
  font-size:2.1em;
  text-align:center;
  background:linear-gradient(135deg, var(--accent3) 0%, var(--accent1) 50%, var(--accent2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 14px var(--glow-color));
  animation:titlePulse 3.5s ease-in-out infinite;
  margin-bottom:14px;
}
@keyframes titlePulse {
  0%,100%{ filter:drop-shadow(0 0 10px var(--glow-color)); }
  50%{ filter:drop-shadow(0 0 28px var(--accent1)); }
}

/* ---- SCOREBOARD ---- */
.score-board {
  display:flex; justify-content:space-around;
  flex-wrap:wrap; gap:8px; margin-bottom:12px;
}
.score-item {
  background: var(--score-bg);
  border:1px solid var(--score-border);
  border-radius:16px;
  padding:8px 14px;
  min-width:88px; text-align:center;
  backdrop-filter:blur(12px);
  transition:all 0.3s;
  position:relative; overflow:hidden;
}
.score-item::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
  border-radius:16px;
}
.score-item:hover {
  transform:translateY(-4px);
  box-shadow:0 8px 24px var(--glow-color);
  border-color:var(--accent1);
}
.score-label {
  display:block; font-size:0.68em; font-weight:700;
  color:var(--text-dim);
  text-transform:uppercase; letter-spacing:1.2px; margin-bottom:3px;
}
.score-value {
  font-family:'Fredoka One',cursive; font-size:1.55em;
  color:var(--accent1);
  text-shadow:0 0 12px var(--glow-color);
}
.score-value.bump { animation:scoreBump 0.38s ease; }
@keyframes scoreBump {
  0%{ transform:scale(1); }
  40%{ transform:scale(1.7); color:#fff; }
  100%{ transform:scale(1); }
}

/* ---- PROGRESS BAR ---- */
.progress-bar {
  width:100%; height:10px;
  background:rgba(255,255,255,0.07);
  border-radius:10px; overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  margin-top:4px;
}
.progress-fill {
  height:100%;
  background:linear-gradient(90deg, var(--progress-from), var(--progress-to));
  background-size:200% 100%;
  border-radius:10px;
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
  animation:progressShimmer 2.5s linear infinite;
  position:relative;
}
.progress-fill::after {
  content:'';
  position:absolute; right:0; top:0; bottom:0; width:22px;
  background:rgba(255,255,255,0.45);
  border-radius:0 10px 10px 0;
  filter:blur(4px);
}
@keyframes progressShimmer {
  0%{ background-position:0% 50%; }
  100%{ background-position:200% 50%; }
}

/* ---- GAME BOARD ---- */
.game-board {
  display:grid;
  grid-template-columns:repeat(var(--board-size,8),1fr);
  gap:4px; margin:14px auto;
  padding:10px;
  background:rgba(0,0,0,0.18);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.07);
  box-shadow:inset 0 2px 24px rgba(0,0,0,0.35);
  max-width:540px; position:relative;
}

/* ---- FRUIT TILES (Improved Glass) ---- */
.fruit-tile {
  width:100%; aspect-ratio:1/1;
  max-width:62px; max-height:62px;
  border-radius:16px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:1.75em;
  position:relative; overflow:hidden;
  user-select:none;
  background:
    linear-gradient(135deg, var(--tile-shine) 0%, var(--tile-bg) 50%, rgba(0,0,0,0.08) 100%);
  border:1px solid var(--tile-border);
  box-shadow:
    0 4px 14px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.22),
    inset 0 -1px 0 rgba(0,0,0,0.12);
  transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
             box-shadow 0.2s ease,
             background 0.25s ease;
}
/* glass gloss top-left */
.fruit-tile::before {
  content:'';
  position:absolute; top:0; left:0;
  width:60%; height:45%;
  background:linear-gradient(135deg,rgba(255,255,255,0.28),transparent);
  border-radius:14px 0 0 0;
  pointer-events:none;
}
/* sweep shine on hover */
.fruit-tile::after {
  content:'';
  position:absolute; top:0; left:-120%;
  width:55%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
  transform:skewX(-15deg);
  transition:left 0.45s;
  pointer-events:none;
}
.fruit-tile:hover::after { left:160%; }
.fruit-tile:hover {
  transform:scale(1.22) translateY(-4px);
  box-shadow:
    0 12px 32px rgba(0,0,0,0.4),
    0 0 20px var(--glow-color),
    inset 0 1px 0 rgba(255,255,255,0.35);
  z-index:4;
}
.fruit-tile.selected {
  transform:scale(1.18) translateY(-5px);
  border-color:var(--accent1);
  box-shadow:
    0 0 0 3px var(--accent1),
    0 0 36px var(--glow-color),
    inset 0 1px 0 rgba(255,255,255,0.3);
  z-index:5;
  animation:selectedPulse 1s ease-in-out infinite;
}
@keyframes selectedPulse {
  0%,100%{ box-shadow:0 0 0 3px var(--accent1), 0 0 20px var(--glow-color); }
  50%{ box-shadow:0 0 0 4px var(--accent1), 0 0 45px var(--accent1); }
}

/* ---- SUPER FRUIT TILES ---- */
.fruit-tile.super-fruit-4 {
  background:linear-gradient(135deg,rgba(255,150,0,0.25),rgba(255,80,0,0.12));
  border:2px solid #ff8c00;
  box-shadow:0 0 22px rgba(255,140,0,0.55), inset 0 1px 0 rgba(255,200,0,0.3);
  animation:superPulse4 1.5s ease-in-out infinite;
}
.fruit-tile.super-fruit-5 {
  background:linear-gradient(135deg,rgba(255,0,200,0.25),rgba(120,0,255,0.15));
  border:2px solid #ff00cc;
  box-shadow:0 0 28px rgba(255,0,200,0.65), inset 0 1px 0 rgba(255,150,255,0.3);
  animation:superPulse5 1.2s ease-in-out infinite;
}
.fruit-tile.super-fruit-6 {
  background:linear-gradient(135deg,rgba(0,200,255,0.3),rgba(0,100,255,0.2));
  border:2px solid #00cfff;
  box-shadow:0 0 36px rgba(0,200,255,0.75), inset 0 1px 0 rgba(100,220,255,0.4);
  animation:superPulse6 0.9s ease-in-out infinite, rainbowBorder 2s linear infinite;
}
@keyframes superPulse4 {
  0%,100%{ box-shadow:0 0 14px rgba(255,140,0,0.4); }
  50%{ box-shadow:0 0 32px rgba(255,200,0,0.8); }
}
@keyframes superPulse5 {
  0%,100%{ box-shadow:0 0 18px rgba(255,0,200,0.5); transform:scale(1); }
  50%{ box-shadow:0 0 44px rgba(255,50,220,0.9); transform:scale(1.05); }
}
@keyframes superPulse6 {
  0%,100%{ box-shadow:0 0 24px rgba(0,200,255,0.6); transform:scale(1) rotate(0deg); }
  33%{ box-shadow:0 0 50px rgba(0,255,200,1); transform:scale(1.06) rotate(1deg); }
  66%{ transform:scale(1.04) rotate(-1deg); }
}
@keyframes rainbowBorder {
  0%{ border-color:#00cfff; }
  33%{ border-color:#ff00cc; }
  66%{ border-color:#ffd700; }
  100%{ border-color:#00cfff; }
}

/* ---- MATCH ANIMATIONS — 3/4/5+ Different ---- */
/* 3-match: spin shrink */
.fruit-tile.match-3 {
  animation:match3Anim 0.65s ease-out forwards !important;
}
@keyframes match3Anim {
  0%{ transform:scale(1); opacity:1; filter:brightness(1); }
  30%{ transform:scale(1.35) rotate(180deg); filter:brightness(2.5); }
  100%{ transform:scale(0) rotate(360deg); opacity:0; }
}
/* 4-match: star burst */
.fruit-tile.match-4 {
  animation:match4Anim 0.75s ease-out forwards !important;
}
@keyframes match4Anim {
  0%{ transform:scale(1); opacity:1; filter:brightness(1) hue-rotate(0deg); }
  20%{ transform:scale(1.6); filter:brightness(3) hue-rotate(90deg); }
  50%{ transform:scale(1.4) rotate(-30deg); opacity:0.8; filter:brightness(4) hue-rotate(180deg); }
  100%{ transform:scale(0) rotate(30deg); opacity:0; filter:brightness(1); }
}
/* 5-match: supernova */
.fruit-tile.match-5 {
  animation:match5Anim 0.9s ease-out forwards !important;
}
@keyframes match5Anim {
  0%{ transform:scale(1); opacity:1; }
  15%{ transform:scale(2.2) rotate(45deg); filter:brightness(5) saturate(3); }
  40%{ transform:scale(1.8) rotate(-20deg); filter:brightness(4) saturate(2); }
  70%{ transform:scale(2.5); opacity:0.4; filter:brightness(6) blur(2px); }
  100%{ transform:scale(0); opacity:0; filter:blur(8px); }
}
/* Super-fruit destroy: mega explosion */
.fruit-tile.match-super {
  animation:matchSuperAnim 1.1s ease-out forwards !important;
}
@keyframes matchSuperAnim {
  0%{ transform:scale(1) rotate(0deg); opacity:1; filter:brightness(1); }
  10%{ transform:scale(3) rotate(10deg); filter:brightness(8) saturate(4); }
  30%{ transform:scale(2.5) rotate(-15deg); filter:brightness(6) hue-rotate(120deg); }
  60%{ transform:scale(3.5) rotate(20deg); opacity:0.5; filter:brightness(10) blur(3px); }
  100%{ transform:scale(0) rotate(45deg); opacity:0; filter:blur(15px); }
}

/* ---- LOCK OVERLAYS ---- */
.fruit-tile.locked { cursor:not-allowed; border:2px dashed rgba(255,60,0,0.7); }
.lock-overlay {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  border-radius:14px; font-size:1.35em; z-index:10;
  animation:lockPulse 2s ease-in-out infinite;
}
.lock-overlay.lock-1 { background:rgba(0,180,0,0.55); }
.lock-overlay.lock-2 { background:rgba(180,0,0,0.65); }
.lock-overlay.lock-3 { background:rgba(100,0,200,0.75); }
@keyframes lockPulse { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.5);} }
.fruit-tile.lock-hit { animation:lockShake 0.4s ease-in-out !important; box-shadow:0 0 30px rgba(255,0,0,0.9) !important; }
@keyframes lockShake {
  0%,100%{transform:translateX(0) rotate(0);}
  18%{transform:translateX(-7px) rotate(-3deg);}
  36%{transform:translateX(7px) rotate(3deg);}
  54%{transform:translateX(-5px) rotate(-2deg);}
  72%{transform:translateX(4px) rotate(2deg);}
}

/* ---- TILE NEW APPEAR ---- */
.fruit-tile.new { animation:tileAppear 0.55s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes tileAppear {
  0%{ opacity:0; transform:scale(0.25) translateY(-35px) rotate(-12deg); }
  100%{ opacity:1; transform:scale(1) translateY(0) rotate(0); }
}

/* ---- COMBO INDICATOR ---- */
.combo-indicator {
  position:absolute; top:38%; left:50%;
  transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;
  font-size:3.2em; pointer-events:none;
  z-index:200; opacity:0; white-space:nowrap;
}
.combo-indicator.show { animation:comboPop 1.3s cubic-bezier(0.36,0.07,0.19,0.97) forwards; }
@keyframes comboPop {
  0%{ opacity:0; transform:translate(-50%,-50%) scale(0.3) rotate(-12deg); }
  25%{ opacity:1; transform:translate(-50%,-70%) scale(1.5) rotate(5deg); }
  55%{ opacity:1; transform:translate(-50%,-80%) scale(1.1) rotate(-2deg); }
  100%{ opacity:0; transform:translate(-50%,-130%) scale(0.8); }
}

/* ---- PARTICLES ---- */
.particle {
  position:fixed; border-radius:50%;
  pointer-events:none; z-index:999;
  animation:pFly 1.1s ease-out forwards;
}
@keyframes pFly {
  0%{ transform:translate(0,0) scale(1); opacity:1; }
  100%{ transform:translate(var(--px),var(--py)) scale(0); opacity:0; }
}
/* ring burst particle for super */
.particle-ring {
  position:fixed; border-radius:50%;
  pointer-events:none; z-index:998;
  border:3px solid var(--rc);
  animation:ringBurst 0.8s ease-out forwards;
}
@keyframes ringBurst {
  0%{ width:0; height:0; opacity:1; transform:translate(var(--rx),var(--ry)); }
  100%{ width:100px; height:100px; opacity:0; transform:translate(calc(var(--rx) - 50px), calc(var(--ry) - 50px)); }
}

/* ---- SCORE POPUP ---- */
.score-popup {
  position:fixed;
  font-family:'Fredoka One',cursive;
  font-size:1.7em;
  pointer-events:none; z-index:500;
  animation:floatUp 1.3s ease-out forwards;
  text-shadow:0 0 12px currentColor;
}
@keyframes floatUp {
  0%{ opacity:1; transform:translateY(0) scale(1); }
  100%{ opacity:0; transform:translateY(-90px) scale(1.4); }
}

/* ---- CONTROLS ---- */
.controls {
  display:flex; justify-content:center;
  gap:9px; margin-top:14px; flex-wrap:wrap;
}
.btn {
  padding:10px 20px;
  border:none; border-radius:50px;
  font-family:'Nunito',sans-serif;
  font-size:0.92em; font-weight:800;
  cursor:pointer; position:relative; overflow:hidden;
  transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  letter-spacing:0.3px;
}
.btn::after {
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,0);
  transition:background 0.15s;
}
.btn:hover::after{ background:rgba(255,255,255,0.12); }
.btn:active{ transform:scale(0.92) !important; }
.btn-primary {
  background:linear-gradient(135deg, var(--btn1-from), var(--btn1-to));
  color:white;
  box-shadow:0 5px 0 var(--btn1-shadow), 0 8px 20px var(--glow-color);
}
.btn-primary:hover {
  transform:translateY(-4px);
  box-shadow:0 9px 0 var(--btn1-shadow), 0 14px 28px var(--glow-color);
}
.btn-secondary {
  background:linear-gradient(135deg, var(--btn2-from), var(--btn2-to));
  color:white;
  box-shadow:0 5px 0 var(--btn2-shadow), 0 8px 20px rgba(0,0,0,0.3);
}
.btn-secondary:hover {
  transform:translateY(-4px);
  box-shadow:0 9px 0 var(--btn2-shadow), 0 14px 28px rgba(0,0,0,0.4);
}

/* ---- ACHIEVEMENT ---- */
.achievement {
  position:fixed; top:20px; right:-340px;
  background:var(--panel-bg);
  border:1px solid var(--card-border);
  padding:14px 22px; border-radius:18px;
  box-shadow:0 6px 30px var(--glow-color);
  transition:right 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
  z-index:1000; min-width:240px;
  backdrop-filter:blur(20px);
}
.achievement.show{ right:20px; }
.achievement h4 {
  font-family:'Fredoka One',cursive;
  color:var(--accent1); font-size:1.1em;
  margin-bottom:4px;
  text-shadow:0 0 10px var(--glow-color);
}
.achievement p { color:var(--text-main); font-size:0.88em; }
.achievement::before {
  content:'🏆'; position:absolute;
  top:-14px; left:16px; font-size:1.6em;
}

/* ---- PANEL OVERLAY ---- */
.panel-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.55);
  z-index:1999; opacity:0; visibility:hidden;
  transition:all 0.3s; backdrop-filter:blur(5px);
}
.panel-overlay.active{ opacity:1; visibility:visible; }

/* ---- CUSTOMIZATION PANEL ---- */
.customization-panel {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0.85);
  opacity:0; visibility:hidden;
  width:370px; max-width:93vw;
  background:var(--panel-bg);
  border:1px solid var(--card-border);
  border-radius:26px; padding:26px 22px;
  box-shadow:0 30px 80px rgba(0,0,0,0.7), 0 0 50px var(--glow-color);
  transition:all 0.36s cubic-bezier(0.34,1.56,0.64,1);

  backdrop-filter:blur(30px);
}
.customization-panel.active {
  transform:translate(-50%,-50%) scale(1);
  opacity:1; visibility:visible;
}
.customization-panel h2 {
  font-family:'Fredoka One',cursive;
  font-size:1.5em; color:var(--accent1);
  margin-bottom:18px;
}
.customization-section {
  margin-bottom:18px; padding-bottom:14px;

}
.customization-section:last-child{ border-bottom:none; }
.customization-section h3 {

.customization-option select,

.customization-option select:focus,
.customization-option input:focus{ border-color:var(--accent1); }
input[type=range]{
  -webkit-appearance:none; height:6px;

}
input[type=range]::-webkit-slider-thumb{

/* ---- LEVEL UP OVERLAY ---- */

/* ---- SUPER FRUIT BADGE ---- */

</style>
</head>
<body>

<!-- Music toggle -->

<script>
// =============================================
//  THEME SYSTEM
// =============================================
function setTheme(name, btn) {
  document.documentElement.setAttribute('data-theme', name === 'mint' ? '' : name);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Update canvas background particles to new accent
  initBgCanvas();
}

// =============================================
//  ANIMATED BACKGROUND CANVAS
// =============================================
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [], leaves = [], wind = [], animFrameId;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); initBgCanvas(); });
resizeCanvas();

// Fruit/leaf slice particles for background
const bgFruits = ['🍓','🍊','🍋','🍇','🍑','🥝','🍉','🍌','🍎'];

function getAccentRgb() {
  const theme = document.documentElement.getAttribute('data-theme') || '';
  if (theme === 'dark') return [160, 90, 255];
  if (theme === 'golden') return [255, 200, 0];
  return [0, 220, 160]; // mint default
}

function initBgCanvas() {
  particles = [];
  leaves = [];
  wind = [];
  // Floating fruit slices
  for (let i = 0; i < 18; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      emoji: bgFruits[Math.floor(Math.random() * bgFruits.length)],
      size: 20 + Math.random() * 28,
      speedX: (Math.random() - 0.5) * 0.4,
      speedY: -0.2 - Math.random() * 0.5,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 1.2,
      opacity: 0.12 + Math.random() * 0.2,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.01 + Math.random() * 0.02
    });
  }
  // Leaves
  for (let i = 0; i < 22; i++) {
    leaves.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 8 + Math.random() * 18,
      speedX: (Math.random() - 0.5) * 0.6,
      speedY: -0.15 - Math.random() * 0.35,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 2,
      opacity: 0.08 + Math.random() * 0.18,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.015 + Math.random() * 0.025,
      phase: Math.random() * Math.PI * 2
    });
  }
  // Wind streaks
  for (let i = 0; i < 12; i++) {
    wind.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      length: 40 + Math.random() * 100,
      speedX: 0.8 + Math.random() * 1.5,
      speedY: (Math.random() - 0.5) * 0.3,
      opacity: 0.04 + Math.random() * 0.09,
      thickness: 0.5 + Math.random() * 1.5
    });
  }
  cancelAnimationFrame(animFrameId);
  animateBg();
}

function drawLeafShape(cx, cy, size, rot, opacity, accentRgb) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot * Math.PI / 180);
  ctx.globalAlpha = opacity;
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.bezierCurveTo(size * 0.6, -size * 0.6, size * 0.7, size * 0.2, 0, size);
  ctx.bezierCurveTo(-size * 0.7, size * 0.2, -size * 0.6, -size * 0.6, 0, -size);
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
  grad.addColorStop(0, `rgba(${accentRgb[0]},${accentRgb[1]},${accentRgb[2]},0.7)`);
  grad.addColorStop(1, `rgba(${accentRgb[0]},${accentRgb[1]},${accentRgb[2]},0.0)`);
  ctx.fillStyle = grad;
  ctx.fill();
  // Midrib
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.8);
  ctx.lineTo(0, size * 0.8);
  ctx.strokeStyle = `rgba(${accentRgb[0]},${accentRgb[1]},${accentRgb[2]},0.4)`;
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();
}

function animateBg() {
  animFrameId = requestAnimationFrame(animateBg);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const [r, g, b] = getAccentRgb();
  const t = Date.now() * 0.001;

  // Animated radial gradient orbs
  const orbs = [
    { x: canvas.width * 0.2, y: canvas.height * 0.25, r: 320, a: 0.22 + 0.06 * Math.sin(t * 0.5) },
    { x: canvas.width * 0.8, y: canvas.height * 0.7,  r: 280, a: 0.18 + 0.05 * Math.sin(t * 0.4 + 1) },
    { x: canvas.width * 0.5, y: canvas.height * 0.5,  r: 200, a: 0.10 + 0.04 * Math.sin(t * 0.7) },
  ];
  for (const o of orbs) {
    const grd = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
    grd.addColorStop(0, `rgba(${r},${g},${b},${o.a})`);
    grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Wind streaks
  for (const w of wind) {
    ctx.save();
    ctx.globalAlpha = w.opacity * (0.5 + 0.5 * Math.sin(t * 1.5 + w.x));
    ctx.strokeStyle = `rgba(${r},${g},${b},1)`;
    ctx.lineWidth = w.thickness;
    ctx.beginPath();
    ctx.moveTo(w.x, w.y);
    ctx.lineTo(w.x + w.length, w.y + w.speedY * 20);
    ctx.stroke();
    ctx.restore();
    w.x += w.speedX;
    w.y += w.speedY;
    if (w.x > canvas.width + 120) { w.x = -120; w.y = Math.random() * canvas.height; }
  }

  // Leaves
  for (const lf of leaves) {
    lf.wobble += lf.wobbleSpeed;
    lf.x += lf.speedX + Math.sin(lf.wobble) * 0.5;
    lf.y += lf.speedY;
    lf.rot += lf.rotSpeed;
    if (lf.y < -40) { lf.y = canvas.height + 40; lf.x = Math.random() * canvas.width; }
    if (lf.x < -40) lf.x = canvas.width + 40;
    if (lf.x > canvas.width + 40) lf.x = -40;
    drawLeafShape(lf.x, lf.y, lf.size, lf.rot, lf.opacity, [r, g, b]);
  }

  // Floating fruit emojis (sliced style)
  for (const p of particles) {
    p.wobble += p.wobbleSpeed;
    p.x += p.speedX + Math.sin(p.wobble) * 0.4;
    p.y += p.speedY;
    p.rot += p.rotSpeed;
    if (p.y < -60) { p.y = canvas.height + 60; p.x = Math.random() * canvas.width; }
    if (p.x < -60) p.x = canvas.width + 60;
    if (p.x > canvas.width + 60) p.x = -60;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.globalAlpha = p.opacity;
    ctx.font = `${p.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Draw clipped "slice" effect
    ctx.save();
    ctx.beginPath();
    // half-circle clip for slice effect
    ctx.arc(0, 0, p.size * 0.7, -Math.PI / 2, Math.PI / 2);
    ctx.closePath();
    ctx.clip();
    ctx.fillText(p.emoji, 0, 0);
    ctx.restore();
    // Slightly show the other half dimmer
    ctx.globalAlpha = p.opacity * 0.35;
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, p.size * 0.7, Math.PI / 2, Math.PI * 1.5);
    ctx.closePath();
    ctx.clip();
    ctx.fillText(p.emoji, 0, 0);
    ctx.restore();
    ctx.restore();
  }
}

initBgCanvas();

// =============================================
//  RELAXING MUSIC (Web Audio API synthesizer)
// =============================================
let musicCtx = null, musicPlaying = false, musicNodes = [];
let musicScheduler = null;

const melodyNotes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
const melody = [0,2,4,5,4,2,0,2, 4,7,5,4,2,4,0,2, 4,5,7,5,4,2,4,5, 7,5,4,2,0,2,4,2];
let melodyIdx = 0;

function startMusic() {
  if (!musicCtx) musicCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (musicCtx.state === 'suspended') musicCtx.resume();
  musicPlaying = true;
  document.getElementById('musicBtn').classList.add('playing');
  document.getElementById('musicBtn').textContent = '🎶';
  playMusicStep();
}

function playMusicStep() {
  if (!musicPlaying) return;
  const now = musicCtx.currentTime;
  // Master gain
  const master = musicCtx.createGain();
  master.gain.setValueAtTime(0.06, now);
  master.connect(musicCtx.destination);

  // Melody note
  const noteIdx = melody[melodyIdx % melody.length];
  const freq = melodyNotes[noteIdx];
  const osc = musicCtx.createOscillator();
  const env = musicCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, now);
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.4, now + 0.05);
  env.gain.exponentialRampToValueAtTime(0.01, now + 0.55);
  osc.connect(env); env.connect(master);
  osc.start(now); osc.stop(now + 0.6);

  // Pad/harmony (fifth above)
  const pad = musicCtx.createOscillator();
  const padGain = musicCtx.createGain();
  pad.type = 'triangle';
  pad.frequency.setValueAtTime(freq * 1.5, now);
  padGain.gain.setValueAtTime(0, now);
  padGain.gain.linearRampToValueAtTime(0.12, now + 0.1);
  padGain.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
  pad.connect(padGain); padGain.connect(master);
  pad.start(now); pad.stop(now + 0.75);

  // Bass on every 4th note
  if (melodyIdx % 4 === 0) {
    const bass = musicCtx.createOscillator();
    const bassGain = musicCtx.createGain();
    bass.type = 'sine';
    bass.frequency.setValueAtTime(freq / 2, now);
    bassGain.gain.setValueAtTime(0, now);
    bassGain.gain.linearRampToValueAtTime(0.18, now + 0.06);
    bassGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
    bass.connect(bassGain); bassGain.connect(master);
    bass.start(now); bass.stop(now + 0.55);
  }

  melodyIdx++;
  musicScheduler = setTimeout(playMusicStep, 420);
}

function stopMusic() {
  musicPlaying = false;
  clearTimeout(musicScheduler);
  document.getElementById('musicBtn').classList.remove('playing');
  document.getElementById('musicBtn').textContent = '🎵';
}

function toggleMusic() {
  if (musicPlaying) stopMusic();
  else startMusic();
}

// =============================================
//  SUPER FRUIT SYSTEM
// =============================================
// superFruitMap: board position => { type: 4|5|6 }
// Type 4 = Fire (4-match), Type 5 = Thunder (5-match), Type 6 = Vortex (6+)
const SUPER_ICONS = { 4:'🔥', 5:'⚡', 6:'🌀' };
const SUPER_MULTIPLIER = { 4:2, 5:5, 6:10 };
const SUPER_RADIUS = { 4:0, 5:1, 6:2 }; // extra tiles destroyed on activation

// =============================================
//  GAME CLASS
// =============================================
class FruitPuzzleGame {
  constructor() {
    this.board = [];
    this.boardSize = 8;
    this.score = 0;
    this.moves = 30;
    this.level = 1;
    this.targetScore = 1000;
    this.selectedTile = null;
    this.isProcessing = false;
    this.soundEnabled = true;
    this.volume = 0.5;
    this.animationSpeed = 0.3;
    this.fruitSets = {
      classic:  ['🍎','🍊','🍋','🍇','🍓','🍑'],
      tropical: ['🥥','🍍','🥭','🍌','🥝','🍉'],
      emoji:    ['😀','😍','🤩','😎','🥳','😋'],
      custom:   ['⭐','💎','🔥','⚡','🌟','✨']
    };
    this.currentFruitSet = 'classic';
    this.fruits = this.fruitSets[this.currentFruitSet];
    this.combo = 0;
    this.lastMatchTime = 0;
    this.achievements = { firstMatch:false, combo5:false, score1000:false, level3:false };
    this.isHardLevel = false;
    this.lockState = [];
    this.superFruits = {}; // key: "row,col" => type (4|5|6)
    this.initializeGame();
    this.createAudioContext();
  }

  createAudioContext() {
    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }

  playSound(frequency, duration, type='sine') {
    if (!this.soundEnabled || !this.audioContext) return;
    const osc = this.audioContext.createOscillator();
    const gain = this.audioContext.createGain();
    osc.connect(gain); gain.connect(this.audioContext.destination);
    osc.frequency.value = frequency; osc.type = type;
    gain.gain.setValueAtTime(this.volume * 0.28, this.audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
    osc.start(this.audioContext.currentTime);
    osc.stop(this.audioContext.currentTime + duration);
  }

  playMatchSound() {
    this.playSound(523.25, 0.1);
    setTimeout(()=>this.playSound(659.25,0.1),55);
    setTimeout(()=>this.playSound(783.99,0.15),110);
  }

  playComboSound(combo) {
    const f = 440 + combo * 55;
    this.playSound(f, 0.1, 'square');
    setTimeout(()=>this.playSound(f*1.25,0.1,'square'),55);
    setTimeout(()=>this.playSound(f*1.5,0.15,'square'),110);
  }

  playSuperSound(type) {
    if (type===4) {
      [300,450,600,800].forEach((f,i)=>setTimeout(()=>this.playSound(f,0.12,'sawtooth'),i*60));
    } else if (type===5) {
      [400,600,800,1000,1300].forEach((f,i)=>setTimeout(()=>this.playSound(f,0.12,'square'),i*55));
    } else {
      [200,400,700,1100,1600,2000].forEach((f,i)=>setTimeout(()=>this.playSound(f,0.15,'sawtooth'),i*50));
    }
  }

  initializeGame() {
    this.generateBoard();
    this.renderBoard();
    this.updateUI();
  }

  generateBoard() {
    this.board = [];
    this.lockState = [];
    this.superFruits = {};
    for (let i=0;i<this.boardSize;i++) {
      this.board[i] = [];
      this.lockState[i] = new Array(this.boardSize).fill(0);
      for (let j=0;j<this.boardSize;j++) {
        this.board[i][j] = this.getRandomFruit();
      }
    }
    this.isHardLevel = false;
    this.removeInitialMatches();
  }

  applyLocks() {
    const hardNum = Math.floor(this.level/4);
    const lockChance = 0.2 + hardNum * 0.1;
    const maxLayers = Math.min(1 + hardNum, 3);
    for (let i=0;i<this.boardSize;i++)
      for (let j=0;j<this.boardSize;j++)
        this.lockState[i][j] = Math.random()<lockChance ? Math.floor(Math.random()*maxLayers)+1 : 0;
  }

  removeInitialMatches() {
    let has=true;
    while(has) {
      has=false;
      for(let i=0;i<this.boardSize;i++)
        for(let j=0;j<this.boardSize;j++)
          if(this.hasMatchAt(i,j)){this.board[i][j]=this.getRandomFruit();has=true;}
    }
  }

  getRandomFruit() { return this.fruits[Math.floor(Math.random()*this.fruits.length)]; }

  hasMatchAt(r,c) {
    const f=this.board[r][c];
    let h=1,v=1;
    for(let j=c-1;j>=0&&this.board[r][j]===f;j--)h++;
    for(let j=c+1;j<this.boardSize&&this.board[r][j]===f;j++)h++;
    for(let i=r-1;i>=0&&this.board[i][c]===f;i--)v++;
    for(let i=r+1;i<this.boardSize&&this.board[i][c]===f;i++)v++;
    return h>=3||v>=3;
  }

  getSuperKey(r,c){return `${r},${c}`;}

  renderBoard() {
    const gb = document.getElementById('gameBoard');
    gb.innerHTML = '';
    gb.style.setProperty('--board-size', this.boardSize);
    for(let i=0;i<this.boardSize;i++) {
      for(let j=0;j<this.boardSize;j++) {
        const tile = document.createElement('div');
        tile.className = 'fruit-tile';
        tile.dataset.row=i; tile.dataset.col=j;
        const key=this.getSuperKey(i,j);
        const superType = this.superFruits[key];
        if (superType) {
          tile.textContent = SUPER_ICONS[superType];
          tile.classList.add(`super-fruit-${superType}`);
          const badge = document.createElement('div');
          badge.className='super-badge';
          badge.textContent = superType===4?'4★':superType===5?'5★':'6★';
          tile.appendChild(badge);
        } else {
          tile.textContent = this.board[i][j];
        }
        const lock=this.lockState[i][j];
        if(lock>0){
          tile.classList.add('locked'); tile.dataset.lock=lock;
          const sym=lock===1?'🔒':lock===2?'⛓️':'🔐';
          tile.innerHTML+=`<div class="lock-overlay lock-${lock}">${sym}</div>`;
        }
        tile.onclick=()=>this.handleTileClick(i,j);
        gb.appendChild(tile);
      }
    }
  }

  handleTileClick(row,col){
    if(this.isProcessing||this.moves<=0)return;
    const tile=document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
    if(!this.selectedTile&&this.lockState[row][col]>0){
      tile.classList.add('lock-hit');
      setTimeout(()=>tile.classList.remove('lock-hit'),500);
      return;
    }
    if(!this.selectedTile){
      this.selectedTile={row,col,element:tile};
      tile.classList.add('selected');
      this.playSound(300,0.08,'sine');
    } else {
      const {row:pr,col:pc}=this.selectedTile;
      if(this.areAdjacent(pr,pc,row,col)){
        if(this.lockState[pr][pc]>0||this.lockState[row][col]>0){
          if(this.lockState[pr][pc]>0){
            this.selectedTile.element.classList.add('lock-hit');
            setTimeout(()=>this.selectedTile.element.classList.remove('lock-hit'),500);
          }
          if(this.lockState[row][col]>0){
            tile.classList.add('lock-hit');
            setTimeout(()=>tile.classList.remove('lock-hit'),500);
          }
          this.selectedTile.element.classList.remove('selected');
          this.selectedTile=null; return;
        }
        this.swapTiles(pr,pc,row,col);
      }
      this.selectedTile.element.classList.remove('selected');
      this.selectedTile=null;
    }
  }

  areAdjacent(r1,c1,r2,c2){
    return(Math.abs(r1-r2)===1&&c1===c2)||(Math.abs(c1-c2)===1&&r1===r2);
  }

  swapTiles(r1,c1,r2,c2){
    this.isProcessing=true;
    [this.board[r1][c1],this.board[r2][c2]]=[this.board[r2][c2],this.board[r1][c1]];
    [this.lockState[r1][c1],this.lockState[r2][c2]]=[this.lockState[r2][c2],this.lockState[r1][c1]];
    // swap super fruits too
    const k1=this.getSuperKey(r1,c1),k2=this.getSuperKey(r2,c2);
    const s1=this.superFruits[k1],s2=this.superFruits[k2];
    if(s1){this.superFruits[k2]=s1;}else{delete this.superFruits[k2];}
    if(s2){this.superFruits[k1]=s2;}else{delete this.superFruits[k1];}
    this.renderBoard();
    setTimeout(()=>{
      const matches=this.findMatches();
      if(matches.length>0){
        this.moves--;
        this.processMatches(matches);
        this.playMatchSound();
      } else {
        [this.board[r1][c1],this.board[r2][c2]]=[this.board[r2][c2],this.board[r1][c1]];
        [this.lockState[r1][c1],this.lockState[r2][c2]]=[this.lockState[r2][c2],this.lockState[r1][c1]];
        const sv1=this.superFruits[k1],sv2=this.superFruits[k2];
        if(sv1){this.superFruits[k2]=sv1;}else{delete this.superFruits[k2];}
        if(sv2){this.superFruits[k1]=sv2;}else{delete this.superFruits[k1];}
        this.renderBoard(); this.isProcessing=false;
      }
    }, this.animationSpeed*1000);
  }

  findMatches(){
    const matches=[];
    for(let i=0;i<this.boardSize;i++)
      for(let j=0;j<this.boardSize;j++){
        const m=this.getMatchFrom(i,j);
        if(m.length>=3) matches.push(...m);
      }
    return matches.filter((m,idx,self)=>idx===self.findIndex(x=>x.row===m.row&&x.col===m.col));
  }

  getMatchFrom(row,col){
    const fruit=this.board[row][col];
    if(fruit===null)return[];
    let matches=[];
    let h=[{row,col}];
    for(let j=col-1;j>=0&&this.board[row][j]===fruit;j--)h.unshift({row,col:j});
    for(let j=col+1;j<this.boardSize&&this.board[row][j]===fruit;j++)h.push({row,col:j});
    if(h.length>=3)matches.push(...h);
    let v=[{row,col}];
    for(let i=row-1;i>=0&&this.board[i][col]===fruit;i--)v.unshift({row:i,col});
    for(let i=row+1;i<this.boardSize&&this.board[i][col]===fruit;i++)v.push({row:i,col});
    if(v.length>=3)matches.push(...v);
    return matches;
  }

  // Detect match length for a set of uniqueMatches
  getMatchGroupSize(uniqueMatches) {
    // Find connected components
    let maxGroup = 0;
    const visited = new Set();
    for(const m of uniqueMatches){
      if(visited.has(`${m.row},${m.col}`)) continue;
      // BFS
      let q=[m],count=0;
      while(q.length){
        const cur=q.pop();
        const key=`${cur.row},${cur.col}`;
        if(visited.has(key))continue;
        visited.add(key); count++;
        uniqueMatches.forEach(n=>{
          if(!visited.has(`${n.row},${n.col}`)&&((Math.abs(n.row-cur.row)===1&&n.col===cur.col)||(Math.abs(n.col-cur.col)===1&&n.row===cur.row)))
            q.push(n);
        });
      }
      if(count>maxGroup) maxGroup=count;
    }
    return maxGroup;
  }

  processMatches(matches){
    const unique=matches.filter((m,i,s)=>i===s.findIndex(x=>x.row===m.row&&x.col===m.col));
    const groupSize=unique.length;

    // Determine match tier
    let tier=3;
    if(groupSize>=6) tier=6;
    else if(groupSize>=5) tier=5;
    else if(groupSize>=4) tier=4;

    // Check for super fruit in match
    let superActivated=null;
    for(const m of unique){
      const key=this.getSuperKey(m.row,m.col);
      if(this.superFruits[key]){ superActivated={pos:m,type:this.superFruits[key]}; break; }
    }

    // Score calculation
    const base=unique.length*10;
    const timeMult=this.combo>0?Math.pow(1.5,this.combo):1;
    let tierMult=tier===4?2:tier===5?5:tier===6?10:1;
    if(superActivated) tierMult*=SUPER_MULTIPLIER[superActivated.type];
    const matchScore=Math.round(base*timeMult*tierMult);
    this.score+=matchScore;
    this.showScorePopup(matchScore, tier, !!superActivated);

    // Combo
    const now=Date.now();
    this.combo=(now-this.lastMatchTime<2000)?this.combo+1:1;
    this.lastMatchTime=now;
    if(this.combo>1){ this.showComboIndicator(this.combo); this.playComboSound(this.combo); }

    // Super fruit creation: if tier>=4 and no super already, place new super at center
    if(!superActivated && tier>=4){
      const center=unique[Math.floor(unique.length/2)];
      const key=this.getSuperKey(center.row,center.col);
      this.superFruits[key]=tier;
    }

    // Activate super fruit if in match
    let extraDestroy=[];
    if(superActivated){
      this.playSuperSound(superActivated.type);
      const rad=SUPER_RADIUS[superActivated.type]||0;
      const {row:sr,col:sc}=superActivated.pos;
      for(let dr=-rad;dr<=rad;dr++)
        for(let dc=-rad;dc<=rad;dc++){
          const nr=sr+dr,nc=sc+dc;
          if(nr>=0&&nr<this.boardSize&&nc>=0&&nc<this.boardSize)
            extraDestroy.push({row:nr,col:nc});
        }
      delete this.superFruits[this.getSuperKey(sr,sc)];
    }

    // All tiles to destroy
    const allDestroy=[...unique, ...extraDestroy].filter((m,i,s)=>i===s.findIndex(x=>x.row===m.row&&x.col===m.col));

    this.checkAchievements();
    let shouldCascade=false;

    // Determine animation class
    let animClass='match-3';
    if(superActivated) animClass='match-super';
    else if(tier===5) animClass='match-5';
    else if(tier===4) animClass='match-4';

    allDestroy.forEach((m,idx)=>{
      const {row,col}=m;
      const tile=document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
      if(!tile)return;
      if(this.lockState[row][col]>0){
        setTimeout(()=>{
          this.lockState[row][col]--;
          shouldCascade=true;
          tile.classList.add('lock-hit');
          setTimeout(()=>tile.classList.remove('lock-hit'),500);
          const ll=this.lockState[row][col];
          const ov=tile.querySelector('.lock-overlay');
          if(ll===0){ tile.classList.remove('locked'); tile.dataset.lock=0; if(ov)ov.remove(); }
          else if(ov){
            ov.textContent=ll===1?'🔒':ll===2?'⛓️':'🔐';
            ov.className=`lock-overlay lock-${ll}`; tile.dataset.lock=ll;
          }
        },idx*45);
      } else {
        setTimeout(()=>{
          tile.classList.add(animClass);
          this.createParticles(tile, tier, !!superActivated);
          shouldCascade=true;
        },idx*45);
      }
    });

    setTimeout(()=>{
      if(!shouldCascade){this.isProcessing=false;this.checkGameEnd();return;}
      this.removeUnlockedMatches(allDestroy);
      // Clear super fruits that were destroyed
      allDestroy.forEach(m=>{
        if(this.lockState[m.row][m.col]===0) delete this.superFruits[this.getSuperKey(m.row,m.col)];
      });
      this.dropTiles();
      const oldBoard=this.board.map(r=>r.slice());
      this.fillBoard();
      this.renderBoard();
      setTimeout(()=>{
        for(let i=0;i<this.boardSize;i++)
          for(let j=0;j<this.boardSize;j++)
            if(oldBoard[i][j]===null&&this.board[i][j]!==null){
              const t=document.querySelector(`[data-row="${i}"][data-col="${j}"]`);
              if(t)t.classList.add('new');
            }
      },50);
      setTimeout(()=>{
        const nm=this.findMatches();
        if(nm.length>0){ this.processMatches(nm); }
        else {
          document.querySelectorAll('.fruit-tile.new').forEach(t=>t.classList.remove('new'));
          this.combo=0; this.isProcessing=false; this.checkGameEnd();
        }
      },this.animationSpeed*1000);
    },this.animationSpeed*1000+120);

    this.updateUI();
  }

  removeUnlockedMatches(matches){
    matches.forEach(m=>{
      if(this.lockState[m.row][m.col]===0) this.board[m.row][m.col]=null;
    });
  }

  createParticles(element, tier=3, isSuper=false){
    const rect=element.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const colors=isSuper?
      ['#00cfff','#ff00cc','#ffd700','#ff6600','#39ff14','#fff']:
      tier===5?['#ff00cc','#cc00ff','#ff66ff','#fff','#ff80d4']:
      tier===4?['#ff8c00','#ffd700','#ff4400','#fff','#ffcc00']:
      ['#2dffb4','#00e5a0','#5fffcb','#fff','#a0ffe8'];
    const count=isSuper?20:tier===5?16:tier===4?12:8;
    for(let i=0;i<count;i++){
      const p=document.createElement('div');
      p.className='particle';
      const size=isSuper?12:tier>=5?10:8;
      p.style.cssText=`width:${size}px;height:${size}px;background:${colors[i%colors.length]};left:${cx}px;top:${cy}px;`;
      const angle=(i/count)*Math.PI*2;
      const dist=isSuper?120+Math.random()*80:tier===5?90+Math.random()*60:tier===4?70+Math.random()*50:50+Math.random()*50;
      p.style.setProperty('--px',Math.cos(angle)*dist+'px');
      p.style.setProperty('--py',Math.sin(angle)*dist+'px');
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),1100);
    }
    // Ring burst for 5+ or super
    if(isSuper||tier>=5){
      const ringColors=isSuper?['#00cfff','#ff00cc','#ffd700']:['#ff00cc','#ffd700'];
      ringColors.forEach((rc,ri)=>{
        setTimeout(()=>{
          const ring=document.createElement('div');
          ring.className='particle-ring';
          ring.style.setProperty('--rx',cx+'px');
          ring.style.setProperty('--ry',cy+'px');
          ring.style.setProperty('--rc',rc);
          document.body.appendChild(ring);
          setTimeout(()=>ring.remove(),900);
        },ri*120);
      });
    }
  }

  showScorePopup(pts, tier=3, isSuper=false){
    const popup=document.createElement('div');
    popup.className='score-popup';
    const label=isSuper?'🌀SUPER! +':tier===5?'⚡+':tier===4?'🔥+':'+';
    popup.textContent=label+pts;
    popup.style.color=isSuper?'#00cfff':tier===5?'#ff00cc':tier===4?'#ff8c00':'var(--accent1)';
    const board=document.getElementById('gameBoard').getBoundingClientRect();
    popup.style.left=(board.left+board.width/2-40)+'px';
    popup.style.top=(board.top+board.height/3)+'px';
    document.body.appendChild(popup);
    setTimeout(()=>popup.remove(),1300);
  }

  showComboIndicator(combo){
    const el=document.getElementById('comboIndicator');
    const colors=['#ffd700','#ff6eb4','#00e5ff','#39ff14','#c084fc','#ff8c00'];
    const c=colors[(combo-2)%colors.length];
    el.textContent=`${combo}x COMBO! 🔥`;
    el.style.color=c; el.style.textShadow=`0 0 24px ${c}`;
    el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1300);
  }

  dropTiles(){
    for(let j=0;j<this.boardSize;j++){
      let empty=this.boardSize-1;
      for(let i=this.boardSize-1;i>=0;i--){
        if(this.board[i][j]!==null){
          if(i!==empty){
            this.board[empty][j]=this.board[i][j]; this.board[i][j]=null;
            this.lockState[empty][j]=this.lockState[i][j]; this.lockState[i][j]=0;
            // move super fruit
            const k=this.getSuperKey(i,j);
            if(this.superFruits[k]){
              this.superFruits[this.getSuperKey(empty,j)]=this.superFruits[k];
              delete this.superFruits[k];
            }
          }
          empty--;
        }
      }
    }
  }

  fillBoard(){
    for(let i=0;i<this.boardSize;i++)
      for(let j=0;j<this.boardSize;j++)
        if(this.board[i][j]===null){
          this.board[i][j]=this.getRandomFruit();
          this.lockState[i][j]=0;
        }
  }

  checkAchievements(){
    if(!this.achievements.firstMatch&&this.score>0){
      this.achievements.firstMatch=true;
      this.showAchievement('First Match! 🍎','You made your first match!');
    }
    if(!this.achievements.combo5&&this.combo>=5){
      this.achievements.combo5=true;
      this.showAchievement('Combo Master! 🔥','You achieved a 5x combo!');
    }
    if(!this.achievements.score1000&&this.score>=1000){
      this.achievements.score1000=true;
      this.showAchievement('Score Master! ⭐','You reached 1000 points!');
    }
    if(!this.achievements.level3&&this.level>=3){
      this.achievements.level3=true;
      this.showAchievement('Level Expert! 🏆','You reached level 3!');
    }
  }

  showAchievement(title,text){
    const ach=document.getElementById('achievement');
    document.getElementById('achievementTitle').textContent=title;
    document.getElementById('achievementText').textContent=text;
    ach.classList.add('show');
    this.playSound(880,0.1);
    setTimeout(()=>this.playSound(1108.73,0.1),100);
    setTimeout(()=>this.playSound(1318.51,0.15),200);
    setTimeout(()=>ach.classList.remove('show'),3500);
  }

  checkGameEnd(){
    if(this.isHardLevel){
      const totalLocks=this.lockState.flat().reduce((s,l)=>s+l,0);
      if(totalLocks===0){
        this.isProcessing=true;
        this.showAchievement('HARD CLEARED! 🎉',`All locks gone! Score:${this.score}`);
        setTimeout(()=>this.showLevelUpAnimation(),1500);
        return;
      }
    }
    if(this.score>=this.targetScore&&!this.isHardLevel){
      this.isProcessing=true; this.showLevelUpAnimation();
    } else if(this.moves<=0){
      this.showAchievement('Game Over! 💀',`Final Score:${this.score}`);
      setTimeout(()=>{
        if(confirm(`Game Over!\nScore: ${this.score}\nPlay again?`)) this.newGame();
      },1200);
    }
  }

  showLevelUpAnimation(){
    const c=document.querySelector('.game-container');
    const old=document.getElementById('levelUpOverlay'); if(old)old.remove();
    const ov=document.createElement('div');
    ov.id='levelUpOverlay';
    ov.innerHTML=`
      <div class="level-up-text">${this.isHardLevel?'HARD CLEARED! 🔓':'LEVEL UP! 🚀'}</div>
      <div class="level-detail">Starting Level ${this.level+1}</div>`;
    c.appendChild(ov);
    setTimeout(()=>ov.style.opacity='1',50);
    setTimeout(()=>{
      ov.style.opacity='0'; this.levelUp();
      setTimeout(()=>{ov.remove();this.isProcessing=false;},500);
    },2300);
  }

  levelUp(){
    this.level++;
    this.targetScore=this.level*1000;
    this.moves+=10;
    this.isHardLevel=(this.level%4===0);
    this.generateBoard();
    if(this.isHardLevel){
      this.applyLocks();
      this.showAchievement('⛓️ HARD LEVEL',`Level ${this.level}: Clear all locks!`);
    } else {
      this.showAchievement('🚀 Level Up!',`Welcome to level ${this.level}!`);
    }
    this.renderBoard(); this.updateUI();
  }

  newGame(){
    this.score=0;
    this.moves=parseInt(document.getElementById('movesLimit').value);
    this.level=1;
    this.targetScore=parseInt(document.getElementById('targetScore').value);
    this.combo=0;
    this.achievements={firstMatch:false,combo5:false,score1000:false,level3:false};
    this.isHardLevel=false;
    this.superFruits={};
    this.initializeGame();
  }

  shuffleBoard(){
    if(this.isProcessing)return;
    this.isProcessing=true;
    for(let i=0;i<this.boardSize;i++)
      for(let j=0;j<this.boardSize;j++){
        const ri=Math.floor(Math.random()*this.boardSize);
        const rj=Math.floor(Math.random()*this.boardSize);
        [this.board[i][j],this.board[ri][rj]]=[this.board[ri][rj],this.board[i][j]];
        [this.lockState[i][j],this.lockState[ri][rj]]=[this.lockState[ri][rj],this.lockState[i][j]];
        const k1=this.getSuperKey(i,j),k2=this.getSuperKey(ri,rj);
        const sv1=this.superFruits[k1],sv2=this.superFruits[k2];
        if(sv1){this.superFruits[k2]=sv1;}else{delete this.superFruits[k2];}
        if(sv2){this.superFruits[k1]=sv2;}else{delete this.superFruits[k1];}
      }
    this.removeInitialMatches();
    this.renderBoard();
    document.querySelectorAll('.fruit-tile').forEach((t,i)=>{
      t.style.transition='transform 0.35s';
      t.style.transform=`rotate(${(Math.random()-0.5)*20}deg) scale(0.75)`;
      setTimeout(()=>{t.style.transform='';},350+i*4);
    });
    setTimeout(()=>this.isProcessing=false,700);
  }

  showHint(){
    if(this.isProcessing)return;
    for(let i=0;i<this.boardSize;i++){
      for(let j=0;j<this.boardSize;j++){
        const adj=[{row:i-1,col:j},{row:i+1,col:j},{row:i,col:j-1},{row:i,col:j+1}];
        for(const a of adj){
          if(a.row<0||a.row>=this.boardSize||a.col<0||a.col>=this.boardSize)continue;
          const oF1=this.board[i][j],oF2=this.board[a.row][a.col];
          const oL1=this.lockState[i][j],oL2=this.lockState[a.row][a.col];
          this.board[i][j]=oF2;this.board[a.row][a.col]=oF1;
          this.lockState[i][j]=oL2;this.lockState[a.row][a.col]=oL1;
          const matches=this.findMatches();
          this.board[i][j]=oF1;this.board[a.row][a.col]=oF2;
          this.lockState[i][j]=oL1;this.lockState[a.row][a.col]=oL2;
          if(matches.length>0){
            [document.querySelector(`[data-row="${i}"][data-col="${j}"]`),
             document.querySelector(`[data-row="${a.row}"][data-col="${a.col}"]`)].forEach(t=>{
              if(!t)return;
              t.style.boxShadow='0 0 35px var(--accent1), 0 0 12px var(--accent2)';
              t.style.transform='scale(1.25)';
              setTimeout(()=>{t.style.boxShadow='';t.style.transform='';},2100);
            });
            return;
          }
        }
      }
    }
  }

  pauseGame(){
    this.isProcessing=!this.isProcessing;
    const btn=document.getElementById('pauseBtn');
    btn.textContent=this.isProcessing?'▶ Resume':'⏸ Pause';
  }

  updateUI(){
    const sv=document.getElementById('score');
    sv.textContent=this.score;
    sv.classList.remove('bump'); void sv.offsetWidth; sv.classList.add('bump');
    document.getElementById('moves').textContent=this.moves;
    document.getElementById('level').textContent=this.level;
    document.getElementById('target').textContent=this.isHardLevel?'Clear Locks':this.targetScore;
    let prog=0;
    if(this.isHardLevel){
      const tot=this.boardSize*this.boardSize;
      prog=((tot-this.lockState.flat().filter(l=>l>0).length)/tot)*100;
    } else { prog=Math.min((this.score/this.targetScore)*100,100); }
    document.getElementById('progressFill').style.width=prog+'%';
  }
}

// Global instance
const game = new FruitPuzzleGame();

// ---- Customization helpers ----
function toggleCustomization(){
  const p=document.getElementById('customizationPanel');
  const o=document.getElementById('panelOverlay');
  p.classList.toggle('active'); o.classList.toggle('active');
}
function updateBoardSize(){
  const s=parseInt(document.getElementById('boardSize').value);
  game.boardSize=s;
  document.getElementById('gameBoard').style.setProperty('grid-template-columns',`repeat(${s},1fr)`);
  game.initializeGame();
}
function updateMovesLimit(){
  const l=document.getElementById('movesLimit').value;
  document.getElementById('movesLimitValue').textContent=l;
  game.moves=parseInt(l); game.updateUI();
}
function updateTargetScore(){
  const t=document.getElementById('targetScore').value;
  document.getElementById('targetScoreValue').textContent=t;
  game.targetScore=parseInt(t); game.updateUI();
}
function updateBackgroundColor(){
  const c=document.getElementById('backgroundColor').value;
  document.body.style.background=`linear-gradient(135deg,${c} 0%,${adjustColor(c,-20)} 100%)`;
}
function adjustColor(color,amount){
  const n=parseInt(color.replace('#',''),16);
  const r=Math.max(0,Math.min(255,(n>>16)+amount));
  const g=Math.max(0,Math.min(255,((n>>8)&0xFF)+amount));
  const b=Math.max(0,Math.min(255,(n&0xFF)+amount));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}
function updateFruitSet(){
  const s=document.getElementById('fruitSet').value;
  game.currentFruitSet=s; game.fruits=game.fruitSets[s]; game.renderBoard();
}
function updateAnimationSpeed(){
  game.animationSpeed=parseFloat(document.getElementById('animationSpeed').value);
}
function toggleSound(){
  game.soundEnabled=document.getElementById('soundEnabled').checked;
}
function updateVolume(){
  game.volume=parseInt(document.getElementById('soundVolume').value)/100;
}
function updateDifficulty(){
  const d=document.getElementById('difficulty').value;
  if(d==='easy'){game.moves=50;game.targetScore=500;}
  else if(d==='medium'){game.moves=30;game.targetScore=1000;}
  else{game.moves=20;game.targetScore=2000;}
  document.getElementById('movesLimit').value=game.moves;
  document.getElementById('movesLimitValue').textContent=game.moves;
  document.getElementById('targetScore').value=game.targetScore;
  document.getElementById('targetScoreValue').textContent=game.targetScore;
  game.updateUI();
}

// Audio resume on first interaction
document.addEventListener('click',function init(){
  if(game.audioContext&&game.audioContext.state==='suspended') game.audioContext.resume();
  document.removeEventListener('click',init);
},{once:true});
</script>
