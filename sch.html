<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Portal | Rangeen UI</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@400;500;600&display=swap');

    * { box-sizing: border-box; }

    body {
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        background: linear-gradient(-45deg, #ff00de, #00d4ff, #7b2ff7, #ff8a00, #00ffb3);
        background-size: 400% 400%;
        animation: bgShift 15s ease infinite;
        font-family: 'Poppins', sans-serif;
        color: #fff;
    }

    @keyframes bgShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* floating glow orbs in background */
    .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.5;
        z-index: 0;
        pointer-events: none;
        animation: floatOrb 10s ease-in-out infinite;
    }
    .orb1 { width: 300px; height: 300px; background: #ff00de; top: -80px; left: -80px; animation-duration: 12s; }
    .orb2 { width: 250px; height: 250px; background: #00d4ff; bottom: -60px; right: -60px; animation-duration: 9s; }
    .orb3 { width: 200px; height: 200px; background: #ffe600; top: 40%; left: 70%; animation-duration: 14s; }

    @keyframes floatOrb {
        0%, 100% { transform: translateY(0) translateX(0); }
        50% { transform: translateY(30px) translateX(20px); }
    }

    .container {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        padding: 35px 30px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 40px 0 rgba(0, 0, 0, 0.5);
        text-align: center;
        width: 100%;
        max-width: 440px;
        margin-top: 30px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        animation: popIn 0.6s ease;
    }

    @keyframes popIn {
        0% { opacity: 0; transform: scale(0.85) translateY(20px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .container:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 50px 0 rgba(0, 212, 255, 0.4);
    }

    h2 {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        margin: 0 0 10px;
        letter-spacing: 3px;
        font-size: 1.8rem;
        background: linear-gradient(90deg, #ff00de, #00d4ff, #ffe600);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 4s linear infinite;
    }

    @keyframes shine {
        to { background-position: 200% center; }
    }

    .desc {
        font-size: 0.95rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.85);
        margin-bottom: 22px;
    }

    input {
        width: 100%;
        padding: 15px;
        margin-bottom: 18px;
        background: rgba(0, 0, 0, 0.25);
        border: 2px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        color: #fff;
        font-size: 1.2rem;
        text-align: center;
        letter-spacing: 4px;
        font-family: 'Orbitron', sans-serif;
        transition: 0.3s;
    }

    input::placeholder {
        letter-spacing: normal;
        font-family: 'Poppins', sans-serif;
        color: rgba(255,255,255,0.5);
        font-size: 1rem;
    }

    input:focus {
        outline: none;
        border-color: #00d4ff;
        box-shadow: 0 0 20px #00d4ff;
        background: rgba(0,0,0,0.4);
    }

    button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(45deg, #ff00de, #00d4ff);
        background-size: 200% auto;
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        text-transform: uppercase;
        transition: 0.4s;
    }

    button:hover {
        background-position: right center;
        box-shadow: 0 0 25px #00d4ff, 0 0 25px #ff00de;
        transform: scale(1.03);
    }

    button:active {
        transform: scale(0.97);
    }

    .status-msg {
        position: relative;
        z-index: 1;
        margin-top: 20px;
        display: none;
        align-items: center;
        gap: 10px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.25);
        padding: 12px 22px;
        border-radius: 30px;
        font-size: 0.95rem;
        animation: popIn 0.4s ease;
    }

    .spinner {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #00ffea;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 500px) {
        h2 { font-size: 1.4rem; }
    }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">
    <h2>SCHOOL PORTAL</h2>
    <p class="desc">
        अपने स्कूल की पूरी जानकारी जानने के लिए नीचे <b>6 अंकों का स्कूल कोड</b> दर्ज करें और
        "फेच डाटा" बटन पर क्लिक करें। सर्च करने के बाद स्कूल की जानकारी वाला पेज अपने आप <b>0.5 सेकंड में नए टैब</b> में खुल जाएगा।
    </p>
    <input type="number" id="schoolCode" placeholder="Enter 6-Digit Code" maxlength="6">
    <button onclick="redirectToSchool()">FETCH DATA</button>
</div>

<div class="status-msg" id="statusMsg">
    <div class="spinner"></div>
    <span id="statusText">जानकारी लोड हो रही है...</span>
</div>

<script>
    function redirectToSchool() {
        const input = document.getElementById('schoolCode').value;
        if (!/^\d{6}$/.test(input)) {
            alert("कृपया सही 6 अंकों का कोड दर्ज करें।");
            return;
        }

        const url = "https://upmsp.edu.in/Pehchan/SchoolInformation.aspx?Code=" + input;

        const statusMsg = document.getElementById('statusMsg');
        const statusText = document.getElementById('statusText');

        statusText.textContent = "स्कूल कोड " + input + " की जानकारी खोली जा रही है...";
        statusMsg.style.display = 'flex';

        setTimeout(function () {
            window.open(url, '_blank');
            statusText.textContent = "नए टैब में खोल दिया गया ✓";
            setTimeout(function () {
                statusMsg.style.display = 'none';
            }, 2000);
        }, 500);
    }
</script>

</body>
</html>
