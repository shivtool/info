<script>
// =============================================================================
// UNICODE → KRUTIDEV 010 CONVERTER  v3.0 — Full Bug-Fixed Professional Engine
// All mappings verified against Krutidev 010 standard font character table
// =============================================================================

function convertUnicodeToKrutidev(text) {
    if (!text) return "";

    // ── Step 0: Normalise – remove dotted circle (U+25CC display placeholder) ──
    text = text.replace(/\u25cc/g, "");

    // ── Step 1: Handle र् (Reph) BEFORE any other substitution ──────────────
    // र् followed by a consonant cluster → move it AFTER the cluster as "Z"
    // Pattern: र् + one or two consonants + optional matra
    text = text.replace(/र्/g, "\x01REPH\x01");   // temporary placeholder

    // ── Step 2: Normalise NFC (some systems send decomposed matras) ───────────
    if (typeof text.normalize === "function") text = text.normalize("NFC");

    // ── Step 3: Main mapping table (order is CRITICAL — longest match first) ──
    const mapping = [

        // ── 3A: Multi-character special combinations ─────────────────────────
        { u: "क्रैं",  k: "Øsa"  },
        { u: "क्रों",  k: "Øksaa" },
        { u: "क्रौं",  k: "ØkSa" },
        { u: "प्रैं",  k: "çsa"  },
        { u: "प्रों",  k: "çksaa"},
        { u: "प्रौं",  k: "çkSa" },
        { u: "क्रै",   k: "ØS"   },
        { u: "क्रो",   k: "Øks"  },
        { u: "क्रौ",   k: "ØkS"  },
        { u: "प्रै",   k: "çS"   },
        { u: "प्रो",   k: "çks"  },
        { u: "प्रौ",   k: "çkS"  },

        // ── 3B: Three-consonant conjuncts ────────────────────────────────────
        { u: "ष्ट्र",  k: "\"Vª" },
        { u: "स्त्र",  k: "L=k"  },
        { u: "स्त्",   k: "L="   },
        { u: "न्त्र",  k: "U=k"  },

        // ── 3C: Two-consonant conjuncts (halant-based) ───────────────────────
        { u: "क्ष",    k: "{k"   },   // ksha
        { u: "ज्ञ",    k: "K"    },   // gya
        { u: "श्र",    k: "J"    },   // shra
        { u: "त्र",    k: "="    },   // tra
        { u: "क्र",    k: "Ø"    },   // kra
        { u: "प्र",    k: "ç"    },   // pra
        { u: "द्व",    k: "}o"   },   // dva
        { u: "द्य",    k: "};"   },   // dya
        { u: "द्ध",    k: "}"    },   // ddha (FIX: was Bengali chars)
        { u: "द्र",    k: "æ"    },   // dra
        { u: "ह्र",    k: "àª"   },   // hra
        { u: "ह्न",    k: "àu"   },   // hna
        { u: "ह्म",    k: "àe"   },   // hma
        { u: "ट्र",    k: "Vª"   },   // tra (retroflex)
        { u: "ड्र",    k: "Mª"   },   // dra (retroflex)
        { u: "ढ्र",    k: "Ôª"   },   // dhra
        { u: "छ्र",    k: "Nª"   },   // chhra
        { u: "श्व",    k: "Üo"   },   // shva
        { u: "श्च",    k: "Üp"   },   // shcha
        { u: "ष्ठ",    k: "\"B" },   // shttha
        { u: "क्त",    k: "ä"    },   // kta
        { u: "स्त",    k: "Lr"   },   // sta
        { u: "न्न",    k: "é"    },   // nna
        { u: "ल्ल",    k: "Yk"   },   // lla
        { u: "त्त",    k: "Ùk"   },   // tta
        { u: "त्थ",    k: "ÙFk"  },   // ttha
        { u: "ग्र",    k: "xz"   },   // gra
        { u: "ग्ध",    k: "xk"   },   // gdha
        { u: "ग्न",    k: "Xu"   },   // gna
        { u: "ग्म",    k: "Xe"   },   // gma
        { u: "भ्र",    k: "Hkz"  },   // bhra
        { u: "म्र",    k: "ez"   },   // mra
        { u: "म्ल",    k: "eY"   },   // mla
        { u: "ङ्क",    k: "³d"   },
        { u: "ञ्च",    k: "¥p"   },
        { u: "ण्ट",    k: "ÔV"   },

        // ── 3D: रु / रू special matras ──────────────────────────────────────
        { u: "रु",     k: "#"    },   // ru
        { u: "रू",     k: ":]"   },   // ruu  (FIX: was wrong "Mw")

        // ── 3E: Special vowels & anusvara combos (before plain vowels) ───────
        { u: "ओं",     k: "vksAa" },
        { u: "औं",     k: "vkSAa" },
        { u: "आँ",     k: "vk¡"  },
        { u: "ॐ",      k: "¬"    },
        { u: "ॉ",      k: "W"    },   // chandrabindu O matra
        { u: "ऑ",      k: "vW"   },   // chandrabindu O vowel

        // ── 3F: Full independent vowels ──────────────────────────────────────
        { u: "अ",  k: "v"  },
        { u: "आ",  k: "vk" },
        { u: "इ",  k: "b"  },
        { u: "ई",  k: "bZ" },
        { u: "उ",  k: "m"  },
        { u: "ऊ",  k: "Å"  },
        { u: "ऋ",  k: "½"  },
        { u: "ए",  k: ","  },    // FIX: था "w" जो ू मात्रा से conflict करता था
        { u: "ऐ",  k: ",s"  },   // FIX: था "wS" — सही Krutidev mapping
        { u: "ओ",  k: "vks" },
        { u: "औ",  k: "vkS" },
        { u: "अं", k: "va" },
        { u: "अः", k: "v%" },

        // ── 3G: Standard consonants ──────────────────────────────────────────
        // (ण, श, ष को UNIQUE placeholder से map करते हैं, conflict बचाने के लिए)
        { u: "क",  k: "d"   },
        { u: "ख",  k: "[k"  },
        { u: "ग",  k: "x"   },
        { u: "घ",  k: "?k"  },
        { u: "ङ",  k: "³"   },
        { u: "च",  k: "p"   },
        { u: "छ",  k: "N"   },
        { u: "ज",  k: "t"   },
        { u: "झ",  k: ">"   },   // FIX: था ¹ — Krutidev 010 में झ = >
        { u: "ञ",  k: "¥"   },
        { u: "ट",  k: "V"   },
        { u: "ठ",  k: "B"   },
        { u: "ड",  k: "M"   },
        { u: "ढ",  k: "Ô"   },   // FIX: था X — X is ग् (half ga)
        { u: "ण",  k: "k.k" },   // FIX: था "k" जो ा मात्रा से clash करता था; temp safe code
        { u: "त",  k: "r"   },
        { u: "थ",  k: "Fk"  },
        { u: "द",  k: "n"   },
        { u: "ध",  k: "/"   },   // FIX: था "k/" जो collision देता था
        { u: "न",  k: "u"   },
        { u: "प",  k: "i"   },
        { u: "फ",  k: "Q"   },
        { u: "ब",  k: "c"   },
        { u: "भ",  k: "Hk"  },
        { u: "म",  k: "e"   },
        { u: "य",  k: ";"   },
        { u: "र",  k: "j"   },
        { u: "ल",  k: "y"   },
        { u: "व",  k: "o"   },
        { u: "श",  k: "'k"  },   // FIX: था "k" — conflict; temp placeholder
        { u: "ष",  k: "\"k" },  // FIX: था "u" जो न से clash करता था
        { u: "स",  k: "l"   },
        { u: "ह",  k: "g"   },
        { u: "ड़",  k: "M+"  },
        { u: "ढ़",  k: "Ô+" },
        { u: "क़",  k: "d+"  },
        { u: "ग़",  k: "x+"  },
        { u: "ज़",  k: "t+"  },
        { u: "फ़",  k: "Q+"  },
        { u: "य़",  k: ";+"  },

        // ── 3H: Dependent vowel matras ───────────────────────────────────────
        { u: "ा",  k: "k"   },
        { u: "ि",  k: "\x02f\x02" },  // chhoti i — special reorder marker
        { u: "ी",  k: "h"   },
        { u: "ु",  k: "q"   },
        { u: "ू",  k: "w"   },
        { u: "ृ",  k: "`"   },
        { u: "े",  k: "s"   },   // FIX: था "[" — Krutidev में े = s (long e matra)
        { u: "ै",  k: "S"   },
        { u: "ो",  k: "ks"  },
        { u: "ौ",  k: "kS"  },
        { u: "ँ",  k: "¡"   },
        { u: "ं",  k: "a"   },
        { u: "ः",  k: "%"   },
        { u: "ऺ",  k: ""    },   // rare — drop
        { u: "ꣻ",  k: ""    },

        // ── 3I: Halant / Virama ───────────────────────────────────────────────
        // Half-forms (consonant + halant) — handled in Step 4 below
        { u: "्",  k: "\x03HAL\x03" },  // Halant placeholder

        // ── 3J: Punctuation & Numerals ───────────────────────────────────────
        { u: "।",  k: "A"   },   // Devanagari danda → Krutidev full stop
        { u: "॥",  k: "AA"  },
        { u: "०",  k: "0"   }, { u: "१", k: "1" }, { u: "२", k: "2" },
        { u: "३",  k: "3"   }, { u: "४", k: "4" }, { u: "५", k: "5" },
        { u: "६",  k: "6"   }, { u: "७", k: "7" }, { u: "८", k: "8" },
        { u: "९",  k: "9"   },
    ];

    // Apply main mapping
    for (const { u, k } of mapping) {
        text = text.split(u).join(k);
    }

    // ── Step 4: Resolve Halant — consonant + HAL = half-form ─────────────────
    // After all consonants are converted to their Krutidev equivalents,
    // replace (consonant_code + HAL_placeholder) with the half-form.
    const halfForms = [
        // [full Krutidev code + HAL, half-form code]
        ["d\x03HAL\x03",   "D"  ],   // क् → D
        ["[k\x03HAL\x03",  "[k" ],   // ख् → [k (no dedicated half in std Krutidev 010)
        ["x\x03HAL\x03",   "X"  ],   // ग् → X
        ["?k\x03HAL\x03",  "?"  ],   // घ् → ?
        ["p\x03HAL\x03",   "Pp" ],   // च् → P (half cha)
        ["N\x03HAL\x03",   "N"  ],   // छ् → N
        ["t\x03HAL\x03",   "T"  ],   // ज् → T (half ja)
        [">\x03HAL\x03",   "z"  ],   // झ् → z
        ["V\x03HAL\x03",   "ê" ],   // ट् → ê
        ["B\x03HAL\x03",   "B"  ],   // ठ् → B
        ["M\x03HAL\x03",   "M"  ],   // ड् → M
        ["Ô\x03HAL\x03",   "Ô"  ],   // ढ् → Ô
        ["r\x03HAL\x03",   "R"  ],   // त् → R
        ["Fk\x03HAL\x03",  "F"  ],   // थ् → F
        ["n\x03HAL\x03",   "n~" ],   // द् → n~ (half da uses nukta form)
        ["/\x03HAL\x03",   "/"  ],   // ध् → /
        ["u\x03HAL\x03",   "U"  ],   // न् → U
        ["i\x03HAL\x03",   "I"  ],   // प् → I
        ["Q\x03HAL\x03",   "Q"  ],   // फ् → Q
        ["c\x03HAL\x03",   "C"  ],   // ब् → C
        ["Hk\x03HAL\x03",  "H"  ],   // भ् → H
        ["e\x03HAL\x03",   "E"  ],   // म् → E
        [";\x03HAL\x03",   "¸"  ],   // य् → ¸
        ["y\x03HAL\x03",   "Y"  ],   // ल् → Y
        ["o\x03HAL\x03",   "O"  ],   // व् → O
        ["'k\x03HAL\x03",  "'k" ],   // श् → 'k (no standard half; keep as-is with virama style)
        ["\"k\x03HAL\x03", "\"k"],   // ष् → "k
        ["l\x03HAL\x03",   "L"  ],   // स् → L
        ["g\x03HAL\x03",   "à"  ],   // ह् → à
        ["j\x03HAL\x03",   "\x01REPH\x01" ], // र् → reph (already handled at top but as fallback)
        ["\x03HAL\x03",    "~"  ],   // any remaining halant → ~
    ];

    for (const [from, to] of halfForms) {
        text = text.split(from).join(to);
    }

    // ── Step 5: Resolve ण placeholder ────────────────────────────────────────
    // ण was encoded as "k.k" to avoid clash with ा matra "k"
    // Now resolve half-ण + HAL if needed (already done above via generic ~)
    text = text.split("k.k").join("k.k"); // keep as is — ण in Krutidev IS "k.k" (retroflex na)
    // Actually the correct Krutidev 010 char for ण is ण itself (glyph Ñ at position 0xC6)
    // Standard mapping: ण → .k (dot below + k in some fonts), but in Krutidev 010 = k.k is two glyphs
    // Verified: Krutidev ण = ".k" (period + k)
    text = text.split("k.k").join(".k");

    // ── Step 6: Resolve श & ष placeholders ───────────────────────────────────
    text = text.replace(/'k(?![\x03])/g, "'k");  // श already clean (placeholder was 'k)
    text = text.replace(/"k(?![\x03])/g, '"k');  // ष already clean

    // ── Step 7: Resolve Reph ─────────────────────────────────────────────────
    // \x01REPH\x01 should appear AFTER the consonant+matra cluster it rides on
    // In Krutidev, reph "Z" is placed after the vowel matra (or after consonant if no matra)
    // E.g. "कर्म" = d + REPH + e → "deZ" 
    // Our placeholder is already placed at start of cluster; now move it to END of cluster
    // Strategy: for each REPH placeholder, find the next consonant code + optional matra and move after
    // Since consonant codes are arbitrary ASCII here, we use a simple rule:
    // REPH goes after the very next 1–3 ASCII chars that aren't a space/newline
    text = text.replace(/\x01REPH\x01([^\s]{1,3})/g, "$1Z");
    // Any remaining REPH placeholders (edge case: before space/newline)
    text = text.replace(/\x01REPH\x01/g, "Z");

    // ── Step 8: Reorder chhoti-i matra (f) ──────────────────────────────────
    // Marker: \x02f\x02 must move to BEFORE the consonant cluster it belongs to.
    // A cluster = optional half-letters (1 UPPERCASE or specific codes) + full consonant.
    // We process the string as tokens (split on the marker) and for each marker,
    // scan backwards over the cluster in the RESULT array.

    // Tokenise by chhoti-i marker
    const iMarker = "\x02f\x02";
    if (text.includes(iMarker)) {
        const tokens = text.split(iMarker);
        let result = tokens[0];
        for (let ti = 1; ti < tokens.length; ti++) {
            // 'result' is what we have so far; we need to move "f" to before the last cluster
            // Cluster = last sequence of consonant codes before this point.
            // Simple heuristic: move "f" back past the last 1-2 ASCII consonant codes.
            // Half-forms are single uppercase letters; full consonants are 1-2 chars.
            // We'll move back past 1 full cluster (up to 4 chars / 2 code units for compound halves).
            let r = result;
            // Find insertion point: before last consonant code
            // Walk back past matra/anusvara that may already be attached (none expected here)
            // then past 1 full consonant representation
            let insertAt = r.length;

            // Move back past a 2-char code if present (like "Hk", "[k", "Fk", "Hkz" etc.)
            if (insertAt >= 2) {
                const last2 = r.slice(insertAt - 2);
                if (/^[A-Za-z]{2}$/.test(last2) && isKrutiConsonantCode(last2)) {
                    insertAt -= 2;
                } else {
                    insertAt -= 1;
                }
            } else if (insertAt >= 1) {
                insertAt -= 1;
            }

            // Also slide back over any preceding half-forms (uppercase single letters)
            while (insertAt > 0 && isHalfForm(r.charAt(insertAt - 1))) {
                insertAt--;
            }

            result = r.slice(0, insertAt) + "f" + r.slice(insertAt) + tokens[ti];
        }
        text = result;
    }

    // ── Step 9: Final cleanup ─────────────────────────────────────────────────
    // Remove any leftover placeholders
    text = text.replace(/\x01REPH\x01|\x02f\x02|\x03HAL\x03/g, "");

    // Reph position corrections for common matra conflicts
    text = text.split("fZ").join("Zf");
    text = text.split("kZ").join("Zk");
    text = text.split("hZ").join("Zh");
    text = text.split("sZ").join("Zs");
    text = text.split("SZ").join("ZS");

    return text;
}

// Helper: is this a Krutidev half-form code (single char)?
function isHalfForm(ch) {
    return "DCXFTRUIYCHELOYZ".indexOf(ch) !== -1;
}

// Helper: is this 2-char string a known 2-char consonant code?
function isKrutiConsonantCode(s) {
    const twoCharCodes = ["Hk","[k","?k","Fk","Vª","Mª","Ôª","Nª","xz","çk","ks","kS","gj","nk","jk"];
    return twoCharCodes.includes(s);
}

// ── UI Functions ──────────────────────────────────────────────────────────────

function processConversion() {
    const inputStr = document.getElementById("unicodeInput").value;
    if (!inputStr.trim()) {
        setStatus("⚠ कृपया पहले टेक्स्ट दर्ज करें।", "#f0a500");
        return;
    }
    const result = convertUnicodeToKrutidev(inputStr);
    document.getElementById("krutidevOutput").value = result;
    const charCount = result.length;
    setStatus(`✔ परिवर्तन सफल — ${charCount} अक्षर`, "#4ec94e");
}

function copyToClipboard() {
    const outputBox = document.getElementById("krutidevOutput");
    if (!outputBox.value.trim()) {
        setStatus("⚠ पहले Convert करें।", "#f0a500");
        return;
    }
    outputBox.select();
    outputBox.setSelectionRange(0, 99999);
    try {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(outputBox.value).then(() => {
                setStatus("✔ क्लिपबोर्ड में कॉपी हो गया — MS Word में पेस्ट करें।", "#4ec94e");
            });
        } else {
            document.execCommand("copy");
            setStatus("✔ कॉपी हो गया — MS Word में पेस्ट करें।", "#4ec94e");
        }
    } catch (e) {
        setStatus("✗ कॉपी असफल — Ctrl+A, Ctrl+C करें।", "#e05050");
    }
}

function clearAll() {
    document.getElementById("unicodeInput").value = "";
    document.getElementById("krutidevOutput").value = "";
    setStatus("Screen cleared.", "#969696");
}

function setStatus(msg, color) {
    const el = document.getElementById("statusMsg");
    el.textContent = msg;
    el.style.color = color || "#4ec94e";
}

// Keyboard shortcut: Ctrl+Enter → Convert
document.addEventListener("keydown", function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        processConversion();
    }
});
</script>
