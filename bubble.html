<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0015">
<title>Bubble Blitz — Shiv Computers</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0015;touch-action:manipulation;font-family:'Rajdhani',sans-serif;}
:root{
  --c1:#ff3cac;--c2:#784ba0;--c3:#2b86c5;
  --gold:#ffd700;--gold2:#ffaa00;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

/* ── CANVAS BG ── */
#bg-canvas{position:fixed;inset:0;z-index:0;}

/* ── SCREEN SYSTEM ── */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s,transform .4s;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97);}

/* ══════════════ HOME SCREEN ══════════════ */
#s-home{background:transparent;}
.home-inner{display:flex;flex-direction:column;align-items:center;gap:0;padding:20px;}

.game-logo{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(36px,10vw,68px);
  text-align:center;line-height:1;letter-spacing:-1px;margin-bottom:4px;
  background:linear-gradient(135deg,#ff3cac 0%,#a855f7 40%,#3b82f6 80%,#06b6d4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px rgba(168,85,247,.6));
  animation:logoGlow 3s ease-in-out infinite alternate;
}
@keyframes logoGlow{from{filter:drop-shadow(0 0 30px rgba(168,85,247,.5));}to{filter:drop-shadow(0 0 60px rgba(255,60,172,.8));}}
.logo-sub{font-family:'Orbitron',sans-serif;font-size:clamp(9px,2.5vw,13px);letter-spacing:6px;color:rgba(168,85,247,.7);text-transform:uppercase;margin-bottom:28px;}

.bubble-row{display:flex;gap:8px;margin-bottom:32px;}
.demo-bubble{
  width:48px;height:48px;border-radius:50%;position:relative;
  animation:float 2.5s ease-in-out infinite;
}
.demo-bubble:nth-child(2){animation-delay:-.5s;}
.demo-bubble:nth-child(3){animation-delay:-1s;}
.demo-bubble:nth-child(4){animation-delay:-1.5s;}
.demo-bubble:nth-child(5){animation-delay:-2s;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

.btn-play{
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:16px;letter-spacing:3px;
  padding:16px 52px;border-radius:50px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#ff3cac,#a855f7,#3b82f6);
  color:#fff;text-transform:uppercase;
  box-shadow:0 0 30px rgba(168,85,247,.5),0 8px 32px rgba(0,0,0,.4);
  transition:all .25s;margin-bottom:16px;
  -webkit-appearance:none;
}
.btn-play:active{transform:scale(.96);}
.btn-play:hover{box-shadow:0 0 50px rgba(168,85,247,.8),0 8px 40px rgba(0,0,0,.5);}

.btn-stages-home{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;
  padding:12px 36px;border-radius:50px;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid rgba(168,85,247,.4);
  color:rgba(168,85,247,.9);text-transform:uppercase;transition:all .25s;
  -webkit-appearance:none;
}
.btn-stages-home:active{transform:scale(.96);}

.home-stats{display:flex;gap:24px;margin-top:24px;}
.hs-item{text-align:center;}
.hs-v{font-family:'Orbitron',sans-serif;font-size:20px;color:var(--gold);font-weight:700;}
.hs-l{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:2px;}

/* ══════════════ STAGE SELECT ══════════════ */
#s-stages{
  background:linear-gradient(180deg,#0a0015,#100025);
  overflow-y:auto;justify-content:flex-start;
  padding-top:calc(var(--safe-top) + 8px);
  padding-bottom:calc(var(--safe-bot) + 80px);
}
.stages-hdr{
  width:100%;position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg,rgba(10,0,21,.98),rgba(10,0,21,.85));
  border-bottom:1px solid rgba(168,85,247,.2);
  padding:12px 16px 10px;text-align:center;
  backdrop-filter:blur(10px);
}
.stages-hdr-title{font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:4px;color:#a855f7;}
.stages-stats{display:flex;justify-content:center;gap:20px;margin-top:6px;}
.ss-item{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;}
.ss-item span{color:var(--gold);font-weight:700;}
.btn-back-stages{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:10px;border:1px solid rgba(168,85,247,.3);
  background:rgba(168,85,247,.1);color:#a855f7;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;-webkit-appearance:none;
}

.worlds-wrap{width:100%;max-width:500px;padding:12px 12px 0;margin:0 auto;}
.world-hdr{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;
  margin-bottom:8px;margin-top:16px;
}
.world-hdr:first-child{margin-top:0;}
.world-hdr-icon{font-size:22px;}
.world-hdr-name{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:#f0d080;font-weight:700;}
.world-hdr-prog{font-size:10px;color:rgba(255,255,255,.4);margin-left:auto;}

.stage-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:4px;}
.sc{
  aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;overflow:hidden;
  cursor:pointer;transition:transform .18s,box-shadow .18s;
  user-select:none;-webkit-user-select:none;min-height:58px;
}
.sc:active{transform:scale(.9);}
.sc-num{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;line-height:1;z-index:1;}
.sc-stars{font-size:8px;margin-top:3px;letter-spacing:1px;z-index:1;}
.sc-badge{position:absolute;top:3px;right:4px;font-size:9px;z-index:2;}
.sc-lock-ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.35;}

.sc-done{background:linear-gradient(135deg,rgba(59,130,246,.25),rgba(168,85,247,.15));border:1px solid rgba(59,130,246,.4);}
.sc-done .sc-num{color:#93c5fd;}
.sc-done .sc-stars{color:var(--gold);}
.sc-open{
  background:linear-gradient(135deg,rgba(255,60,172,.2),rgba(168,85,247,.2));
  border:1.5px solid rgba(255,60,172,.7);
  box-shadow:0 0 18px rgba(255,60,172,.35);
  animation:scpulse 2s ease-in-out infinite;
}
.sc-open .sc-num{color:#ff3cac;}
@keyframes scpulse{0%,100%{box-shadow:0 0 18px rgba(255,60,172,.35);}50%{box-shadow:0 0 30px rgba(255,60,172,.7);}}
.sc-lock{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:not-allowed;opacity:.45;}
.sc-lock:active{transform:none;}
.sc-boss{border-color:rgba(255,100,100,.7)!important;box-shadow:0 0 14px rgba(255,60,60,.3)!important;}
.sc-boss .sc-num{color:#ff6464!important;}

/* ══════════════ GAME SCREEN ══════════════ */
#s-game{background:transparent;justify-content:flex-start;padding:0;}
#game-canvas{display:block;position:absolute;inset:0;touch-action:none;}

/* HUD */
.hud{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;
  background:rgba(10,0,21,.92);border-bottom:1px solid rgba(168,85,247,.2);
  padding:8px 14px;padding-top:calc(8px + var(--safe-top));
  backdrop-filter:blur(12px);gap:4px;
}
.hud-item{flex:1;text-align:center;}
.hud-lbl{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:2px;color:rgba(168,85,247,.6);text-transform:uppercase;display:block;margin-bottom:1px;}
.hud-val{font-family:'Orbitron',sans-serif;font-size:16px;color:#f0d080;font-weight:700;line-height:1;}
.hud-sep{width:1px;height:30px;background:rgba(168,85,247,.2);flex-shrink:0;}
.hud-btns{display:flex;gap:7px;align-items:center;}
.hud-btn{
  width:36px;height:36px;border-radius:10px;border:1px solid rgba(168,85,247,.3);
  background:rgba(168,85,247,.1);color:#a855f7;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;-webkit-appearance:none;
}

/* Shooter bar */
.shooter-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  height:calc(88px + var(--safe-bot));
  background:rgba(10,0,21,.92);border-top:1px solid rgba(168,85,247,.2);
  display:flex;align-items:center;justify-content:center;gap:0;
  padding-bottom:var(--safe-bot);backdrop-filter:blur(12px);
}
.sb-next{text-align:center;padding:0 20px;}
.sb-next-lbl{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;display:block;margin-bottom:6px;}
.sb-next-ball{width:38px;height:38px;border-radius:50%;margin:0 auto;position:relative;}
.sb-next-ball::after{content:'';position:absolute;top:12%;left:18%;width:30%;height:20%;background:rgba(255,255,255,.65);border-radius:50%;filter:blur(2px);transform:rotate(-30deg);}

.sb-main{display:flex;flex-direction:column;align-items:center;gap:6px;}
.sb-shooter{
  width:64px;height:64px;border-radius:50%;position:relative;cursor:pointer;
  box-shadow:0 0 20px rgba(168,85,247,.4);border:2px solid rgba(255,255,255,.15);
}
.sb-shooter::after{content:'';position:absolute;top:10%;left:16%;width:30%;height:20%;background:rgba(255,255,255,.68);border-radius:50%;filter:blur(3px);transform:rotate(-30deg);}
.sb-hint{font-size:12px;letter-spacing:1px;color:rgba(255,255,255,.3);text-transform:uppercase;}

.sb-swap{padding:0 20px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.sb-swap-btn{
  width:42px;height:42px;border-radius:50%;border:1px solid rgba(168,85,247,.4);
  background:rgba(168,85,247,.12);color:#a855f7;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;-webkit-appearance:none;
  transition:all .2s;
}
.sb-swap-btn:active{transform:scale(.88);background:rgba(168,85,247,.3);}
.sb-swap-lbl{font-size:8px;letter-spacing:1px;color:rgba(168,85,247,.5);text-transform:uppercase;}

/* Aim line canvas drawn — no extra CSS needed */

/* Toast */
#toast{
  position:fixed;top:calc(64px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-10px);
  background:rgba(10,0,21,.97);border:1px solid rgba(168,85,247,.5);border-radius:50px;
  padding:9px 22px;color:#f0d080;font-family:'Orbitron',sans-serif;font-size:11px;
  letter-spacing:2px;z-index:100;opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(168,85,247,.3);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══════════════ MODAL ══════════════ */
.modal-ov{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);
}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal-box{
  width:100%;max-width:460px;
  background:linear-gradient(180deg,#12002a,#0a0015);
  border:1px solid rgba(168,85,247,.4);border-radius:24px 24px 0 0;
  padding:20px 22px calc(22px + var(--safe-bot));
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -8px 50px rgba(168,85,247,.2);
}
.modal-ov.open .modal-box{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:rgba(168,85,247,.4);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Orbitron',sans-serif;font-size:18px;color:#f0d080;text-align:center;margin-bottom:4px;}
.modal-world{font-size:11px;letter-spacing:3px;color:rgba(168,85,247,.7);text-align:center;margin-bottom:16px;text-transform:uppercase;}
.modal-stats{display:flex;justify-content:space-around;background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.15);border-radius:14px;padding:14px 8px;margin-bottom:14px;}
.ms-item{text-align:center;}
.ms-lbl{font-size:9px;letter-spacing:2px;color:rgba(168,85,247,.6);text-transform:uppercase;display:block;margin-bottom:4px;}
.ms-val{font-family:'Orbitron',sans-serif;font-size:16px;color:#f0d080;}
.modal-hint{font-size:12px;color:rgba(255,255,255,.45);text-align:center;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;border-left:2px solid rgba(168,85,247,.5);margin-bottom:16px;font-style:italic;}
.modal-btns{display:flex;gap:10px;}
.btn-modal-play{flex:2;font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:2px;padding:14px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#ff3cac,#a855f7);color:#fff;-webkit-appearance:none;}
.btn-modal-close{flex:1;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:2px;padding:14px;border-radius:14px;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(168,85,247,.3);color:rgba(168,85,247,.8);-webkit-appearance:none;}

/* ══════════════ RESULT ══════════════ */
.result-ov{
  position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .4s;backdrop-filter:blur(6px);
}
.result-ov.show{opacity:1;pointer-events:all;}
.result-box{
  background:linear-gradient(135deg,#12002a,#0a0015);
  border:1px solid rgba(168,85,247,.5);border-radius:24px;
  padding:32px 28px;text-align:center;max-width:320px;width:90%;
  box-shadow:0 0 60px rgba(168,85,247,.3);
  transform:scale(.9);transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
}
.result-ov.show .result-box{transform:scale(1);}
.res-icon{font-size:56px;margin-bottom:12px;display:block;}
.res-title{font-family:'Orbitron',sans-serif;font-size:24px;color:#f0d080;margin-bottom:4px;}
.res-sub{font-size:12px;letter-spacing:2px;color:rgba(168,85,247,.7);margin-bottom:18px;text-transform:uppercase;}
.res-stars{font-size:32px;color:var(--gold);margin-bottom:10px;letter-spacing:4px;}
.res-score-lbl{font-size:9px;letter-spacing:2px;color:rgba(168,85,247,.6);text-transform:uppercase;margin-bottom:4px;}
.res-score{font-family:'Orbitron',sans-serif;font-size:32px;color:#f0d080;margin-bottom:24px;}
.res-btns{display:flex;gap:10px;justify-content:center;}
.res-btns button{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px;padding:12px 20px;border-radius:12px;cursor:pointer;-webkit-appearance:none;border:none;}
#r-retry{background:linear-gradient(135deg,#ff3cac,#a855f7);color:#fff;}
#r-next{background:linear-gradient(135deg,#a855f7,#3b82f6);color:#fff;}
#r-map{background:rgba(255,255,255,.06);border:1px solid rgba(168,85,247,.3)!important;color:rgba(168,85,247,.8);}

/* Bottom nav */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:35;
  display:flex;justify-content:space-around;
  background:rgba(10,0,21,.95);border-top:1px solid rgba(168,85,247,.15);
  padding:8px 0 calc(8px + var(--safe-bot));backdrop-filter:blur(12px);
}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 22px;cursor:pointer;border:none;background:none;color:rgba(168,85,247,.5);transition:color .2s;-webkit-appearance:none;}
.nav-btn.active,.nav-btn:active{color:#f0d080;}
.nav-icon{font-size:22px;line-height:1;}
.nav-lbl{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;text-transform:uppercase;}

/* particles canvas overlay */
#fx-canvas{position:fixed;inset:0;z-index:15;pointer-events:none;}

/* Stage clear badge */
.scb{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:55;
  font-family:'Orbitron',sans-serif;color:#f0d080;text-align:center;
  background:rgba(10,0,21,.97);border:1px solid rgba(168,85,247,.5);
  border-radius:20px;padding:28px 40px;
  box-shadow:0 0 60px rgba(168,85,247,.4);
  transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
}
.scb.show{transform:translate(-50%,-50%) scale(1);}
.scb-title{font-size:22px;margin-bottom:8px;}
.scb-stars{font-size:34px;color:var(--gold);margin-bottom:8px;letter-spacing:4px;}
.scb-score{font-size:18px;color:rgba(240,208,128,.7);}
</style>
</head>
<body>

<!-- Background canvas (animated particles, nebula) -->
<canvas id="bg-canvas"></canvas>
<!-- FX canvas (explosions, particles on top) -->
<canvas id="fx-canvas"></canvas>

<!-- ══ HOME ══ -->
<div class="screen" id="s-home">
  <div class="home-inner">
    <div class="game-logo">BUBBLE<br>BLITZ</div>
    <div class="logo-sub">Shiv Computers</div>
    <div class="bubble-row" id="demo-bubbles"></div>
    <button class="btn-play" id="btn-play">▶ &nbsp;PLAY</button>
    <button class="btn-stages-home" id="btn-stages-from-home">SELECT STAGE</button>
    <div class="home-stats">
      <div class="hs-item"><div class="hs-v" id="hs-done">0</div><div class="hs-l">Stages</div></div>
      <div class="hs-item"><div class="hs-v" id="hs-stars">0</div><div class="hs-l">Stars</div></div>
      <div class="hs-item"><div class="hs-v" id="hs-best">0</div><div class="hs-l">Best</div></div>
    </div>
  </div>
</div>

<!-- ══ STAGE SELECT ══ -->
<div class="screen hidden" id="s-stages">
  <div class="stages-hdr">
    <button class="btn-back-stages" id="btn-back-from-stages">‹</button>
    <div class="stages-hdr-title">SELECT STAGE</div>
    <div class="stages-stats">
      <div class="ss-item">Cleared: <span id="st-done">0</span></div>
      <div class="ss-item">Stars: <span id="st-stars">0</span>⭐</div>
      <div class="ss-item">Score: <span id="st-score">0</span></div>
    </div>
  </div>
  <div class="worlds-wrap" id="worlds-wrap"></div>
</div>

<!-- ══ GAME ══ -->
<div class="screen hidden" id="s-game">
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-item"><span class="hud-lbl">Stage</span><span class="hud-val" id="h-stage">1</span></div>
    <div class="hud-sep"></div>
    <div class="hud-item"><span class="hud-lbl">Score</span><span class="hud-val" id="h-score">0</span></div>
    <div class="hud-sep"></div>
    <div class="hud-item"><span class="hud-lbl">Left</span><span class="hud-val" id="h-left">0</span></div>
    <div class="hud-sep"></div>
    <div class="hud-btns">
      <button class="hud-btn" id="btn-pause">⏸</button>
      <button class="hud-btn" id="btn-back-game">⬅</button>
    </div>
  </div>

  <!-- Shooter -->
  <div class="shooter-bar">
    <div class="sb-next">
      <span class="sb-next-lbl">Next</span>
      <div class="sb-next-ball" id="next-ball"></div>
    </div>
    <div class="sb-main">
      <div class="sb-shooter" id="shooter-ball"></div>
      <div class="sb-hint">TAP TO SHOOT</div>
    </div>
    <div class="sb-swap">
      <button class="sb-swap-btn" id="btn-swap">⇄</button>
      <span class="sb-swap-lbl">Swap</span>
    </div>
  </div>
</div>

<!-- Stage Modal -->
<div class="modal-ov" id="stage-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-title">Stage 1</div>
    <div class="modal-world" id="m-world"></div>
    <div class="modal-stats">
      <div class="ms-item"><span class="ms-lbl">Stars</span><span class="ms-val" id="m-stars">☆☆☆</span></div>
      <div class="ms-item"><span class="ms-lbl">Best</span><span class="ms-val" id="m-score">—</span></div>
      <div class="ms-item"><span class="ms-lbl">Diff</span><span class="ms-val" id="m-diff">Easy</span></div>
      <div class="ms-item"><span class="ms-lbl">Rows</span><span class="ms-val" id="m-rows">6</span></div>
    </div>
    <div class="modal-hint" id="m-hint"></div>
    <div class="modal-btns">
      <button class="btn-modal-close" id="btn-m-close">Cancel</button>

<script>
'use strict';
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const COLS = 9;           // bubbles per row
const R = 22;             // bubble radius
const ROW_H = R * 1.72;   // vertical spacing (hex grid)
const HUD_H = 58;         // top HUD height (approx)
const SHOOT_H = 88;       // bottom bar height

// Color palette — vibrant
const COLORS = [
  {id:'red',    hi:'#ff9999',mid:'#ff3355',lo:'#aa0022',sh:'rgba(255,50,80,.8)'},
  {id:'blue',   hi:'#99ccff',mid:'#3399ff',lo:'#0044bb',sh:'rgba(50,150,255,.8)'},
  {id:'green',  hi:'#99ffcc',mid:'#33dd88',lo:'#008844',sh:'rgba(50,220,130,.8)'},
  {id:'yellow', hi:'#ffff99',mid:'#ffdd22',lo:'#aa8800',sh:'rgba(255,220,30,.8)'},
  {id:'purple', hi:'#ddaaff',mid:'#aa44ff',lo:'#6600cc',sh:'rgba(170,60,255,.8)'},
  {id:'orange', hi:'#ffcc88',mid:'#ff8833',lo:'#cc4400',sh:'rgba(255,130,50,.8)'},
  {id:'cyan',   hi:'#aaffff',mid:'#22ddee',lo:'#008899',sh:'rgba(30,210,230,.8)'},
  {id:'pink',   hi:'#ffaad4',mid:'#ff66aa',lo:'#bb0055',sh:'rgba(255,100,170,.8)'},
];

const WORLDS = [
  {name:'Cosmic Nebula', emoji:'🌌', color:'rgba(168,85,247,.25)', stages:[1,20]},
  {name:'Neon City',     emoji:'🌆', color:'rgba(255,60,172,.25)', stages:[21,40]},
  {name:'Deep Ocean',    emoji:'🌊', color:'rgba(30,150,255,.25)', stages:[41,60]},
  {name:'Inferno',       emoji:'🔥', color:'rgba(255,100,30,.25)', stages:[61,80]},
  {name:'Final Cosmos',  emoji:'⭐', color:'rgba(255,220,30,.25)', stages:[81,100]},
];

const STAGE_NAMES = [
  'First Light','Stardust','Orbit One','Gravity','Supernova',
  'Pulsar','Quasar','Dark Matter','Void Edge','Nebula Core',
  'Neon Dawn','Grid Lock','Pixel Run','Synth Wave','Data Storm',
  'Glitch Zone','Byte Rush','Circuit','Signal Burst','Hack Core',
  'Abyss','Coral Maze','Deep Dive','Tidal Wave','Sonar Pulse',
  'Current','Riptide','Biolume','Trench','Kraken Gate',
  'Spark','Magma','Cinder','Lava Flow','Inferno Run',
  'Char Path','Ash Fall','Ember Rise','Blaze Peak','Dragon Fire',
  'Zenith','Apex','Ascension','Radiance','Stellar',
  'Cosmos End','Light Year','Nova Fall','Singularity','Grand Finale',
  ...Array.from({length:50},(_,i)=>'Stage '+(51+i)),
];

const HINTS = [
  'Same rang ke 3+ bubbles milao!',
  'Combo ke liye chain reaction!',
  'Wall se bounce karke aim karo!',
  'Boss level — dhyan se khelo!',
  'Speed badh rahi hai, jaldi karo!',
  'Floating bubbles shoot karo!',
  'Color match karo — boom!',
  'Perfect aim se max score!',
];

const DIFFS = ['Easy','Easy','Normal','Normal','Hard','Hard','Expert','Expert','Intense','Boss'];

// Save
const SAVE_KEY = 'bb_save_v1';
let save = {done:new Set(),stars:{},scores:{},total:0};
function loadSave(){
  try{
    const r = JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
    save.done = new Set(r.done||[]);
    save.stars = r.stars||{};
    save.scores = r.scores||{};
    save.total = r.total||0;
  }catch(e){}
}
function doSave(){
  try{ localStorage.setItem(SAVE_KEY,JSON.stringify({done:[...save.done],stars:save.stars,scores:save.scores,total:save.total})); }catch(e){}
}
loadSave();

// ─────────────────────────────────────────────
// BACKGROUND CANVAS — nebula / stars
// ─────────────────────────────────────────────
const bgC = document.getElementById('bg-canvas');
const bgX = bgC.getContext('2d');
let bgW=0,bgH=0;
const bgStars=[];

function initBG(){
  bgW=bgC.width=window.innerWidth;
  bgH=bgC.height=window.innerHeight;
  bgStars.length=0;
  for(let i=0;i<160;i++) bgStars.push({
    x:Math.random()*bgW, y:Math.random()*bgH,
    r:Math.random()*1.8+.3, a:Math.random(), da:(.002+Math.random()*.003)*(Math.random()<.5?1:-1),
    hue:Math.floor(Math.random()*360)
  });
}
let bgT=0;
function drawBG(){
  bgX.clearRect(0,0,bgW,bgH);
  // Gradient bg
  const g=bgX.createRadialGradient(bgW*.5,bgH*.3,0,bgW*.5,bgH*.5,bgW*.8);
  g.addColorStop(0,'#150030');g.addColorStop(.5,'#0a0018');g.addColorStop(1,'#050010');
  bgX.fillStyle=g; bgX.fillRect(0,0,bgW,bgH);
  // Nebula clouds
  for(let i=0;i<3;i++){
    const nx=bgW*(.2+i*.3)+Math.sin(bgT*.0003+i)*40;
    const ny=bgH*(.3+i*.15);
    const rg=bgX.createRadialGradient(nx,ny,0,nx,ny,120+i*50);
    const hue=[280,320,200][i];
    rg.addColorStop(0,`hsla(${hue},80%,40%,.12)`);
    rg.addColorStop(1,'transparent');
    bgX.fillStyle=rg; bgX.fillRect(0,0,bgW,bgH);
  }
  // Stars
  for(const s of bgStars){
    s.a+=s.da; if(s.a>1||s.a<0) s.da*=-1;
    bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=`hsla(${s.hue},80%,90%,${s.a})`;
    bgX.fill();
  }
  bgT++;
  requestAnimationFrame(drawBG);
}
window.addEventListener('resize',()=>{initBG();resizeGame();});
initBG(); drawBG();

// ─────────────────────────────────────────────
// FX CANVAS — explosions, trails
// ─────────────────────────────────────────────
const fxC = document.getElementById('fx-canvas');
const fxX = fxC.getContext('2d');
const fxParticles = [];

function resizeFX(){fxC.width=window.innerWidth;fxC.height=window.innerHeight;}
resizeFX();

function addBurst(x,y,col,count=12){
  for(let i=0;i<count;i++){
    const a=Math.PI*2/count*i+Math.random()*.4;
    const spd=2+Math.random()*4;
    fxParticles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:R*.55,col,alpha:1,scale:1});
  }
}
function addTrail(x,y,col){
  fxParticles.push({x,y,vx:(Math.random()-.5)*1.5,vy:-Math.random()*2,r:R*.35,col,alpha:.6,scale:1,trail:true});
}

function drawFX(){
  fxX.clearRect(0,0,fxC.width,fxC.height);
  for(let i=fxParticles.length-1;i>=0;i--){
    const p=fxParticles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.08;
    p.alpha-=p.trail?.04:.05;
    p.scale+=.04;
    if(p.alpha<=0){fxParticles.splice(i,1);continue;}
    fxX.save();
    fxX.globalAlpha=p.alpha;
    fxX.translate(p.x,p.y); fxX.scale(p.scale,p.scale);
    drawBubble3D(fxX,0,0,p.r,p.col);
    fxX.restore();
  }
  requestAnimationFrame(drawFX);
}
drawFX();

// ─────────────────────────────────────────────
// 3D BUBBLE DRAW (shared)
// ─────────────────────────────────────────────
function drawBubble3D(ctx,x,y,r,col,alpha=1,glowing=false){
  ctx.save();
  ctx.globalAlpha *= alpha;
  // Glow
  if(glowing){
    ctx.shadowBlur=28;
    ctx.shadowColor=col.sh;
  }
  // Base sphere
  const g=ctx.createRadialGradient(x-r*.3,y-r*.35,r*.08,x,y,r);
  g.addColorStop(0,col.hi);
  g.addColorStop(.45,col.mid);
  g.addColorStop(.85,col.lo);
  g.addColorStop(1,'rgba(0,0,0,.4)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.shadowBlur=0;
  // Rim highlight
  const rim=ctx.createRadialGradient(x,y,r*.7,x,y,r);
  rim.addColorStop(0,'transparent');
  rim.addColorStop(1,'rgba(255,255,255,.08)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=rim; ctx.fill();
  // Main shine
  const sh=ctx.createRadialGradient(x-r*.3,y-r*.38,0,x-r*.1,y-r*.2,r*.52);
  sh.addColorStop(0,'rgba(255,255,255,.82)');
  sh.addColorStop(.4,'rgba(255,255,255,.25)');
  sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.ellipse(x-r*.22,y-r*.28,r*.35,r*.22,-0.4,0,Math.PI*2);
  ctx.fillStyle=sh; ctx.fill();
  // Small secondary shine
  ctx.beginPath(); ctx.arc(x+r*.28,y+r*.3,r*.1,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.2)'; ctx.fill();
  // Edge
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}

// ─────────────────────────────────────────────
// GAME ENGINE
// ─────────────────────────────────────────────
const gc = document.getElementById('game-canvas');
const gx = gc.getContext('2d');

let GW=0, GH=0;
function resizeGame(){
  GW=gc.width=window.innerWidth;
  GH=gc.height=window.innerHeight;
}
resizeGame();

// Compute layout
function layout(){
  const topY = HUD_H + 10;
  const gridW = COLS * R*2;
  const offX = (GW - gridW)/2 + R;
  return {topY, offX};
}

// Grid: G.grid[row][col] = {col:COLORS[i], alive:true} or null
const G = {
  grid:[],
  rows:0,
  shooter:null, next:null,
  bullet:null,
  canShoot:true,
  score:0, stageIdx:0,
  aimX:GW/2, aimY:GH-SHOOT_H-R-4,
  hasAim:false,
  running:false, paused:false,
  animId:null, last:0,
  activeStage:null,
  shootCount:0,
};

function stageConfig(idx){
  const n=idx+1;
  const world=WORLDS.find(w=>n>=w.stages[0]&&n<=w.stages[1])||WORLDS[0];
  const colorCount=n<=10?3:n<=25?4:n<=50?5:n<=75?6:n<=90?7:8;
  const rows=n<=5?4:n<=15?5:n<=30?6:n<=50?7:n<=70?8:n<=90?9:10;
  const type=n%10===0?'boss':n%7===0?'secret':'normal';
  return{n,world,colorCount,rows,type,
    diff:DIFFS[(n-1)%10],
    name:STAGE_NAMES[Math.min(idx,STAGE_NAMES.length-1)]||'Stage '+n,
    hint:HINTS[idx%HINTS.length]};
}

function initGrid(sc){
  G.grid=[];
  G.rows=sc.rows;
  const cols=COLORS.slice(0,sc.colorCount);
  for(let row=0;row<sc.rows;row++){
    G.grid[row]=[];
    const cnt = row%2===0?COLS:COLS-1;
    for(let col=0;col<cnt;col++){
      const c=cols[Math.floor(Math.random()*cols.length)];
      G.grid[row][col]={col:c,alive:true};
    }
  }
}

function initStage(idx){
  const sc=stageConfig(idx);
  G.stageIdx=idx; G.activeStage=sc;
  G.score=0; G.canShoot=true; G.bullet=null;
  G.paused=false; G.hasAim=false; G.shootCount=0;
  initGrid(sc);
  G.shooter=randBubble(sc);
  G.next=randBubble(sc);
  updateShooterUI();
  updateHUD();
}

function randBubble(sc){
  const cols=COLORS.slice(0,sc.colorCount);
  return cols[Math.floor(Math.random()*cols.length)];
}

// Bubble grid position
function bubblePos(row,col){
  const {topY,offX}=layout();
  const isOdd=row%2===1;
  const x=offX + col*R*2 + (isOdd?R:0);
  const y=topY + row*ROW_H + R;
  return {x,y};
}

// ─────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────
function drawGrid(){
  for(let row=0;row<G.grid.length;row++){
    if(!G.grid[row]) continue;
    const cnt=G.grid[row].length;
    for(let col=0;col<cnt;col++){
      const b=G.grid[row][col];
      if(!b||!b.alive) continue;
      const {x,y}=bubblePos(row,col);
      drawBubble3D(gx,x,y,R,b.col,1,false);
    }
  }
}

function drawBullet(){
  if(!G.bullet) return;
  drawBubble3D(gx,G.bullet.x,G.bullet.y,R,G.bullet.col,1,true);
  // Trail
  if(Math.random()<.4) addTrail(G.bullet.x,G.bullet.y,G.bullet.col);
}

function drawShooterOnCanvas(){
  if(!G.shooter||!G.canShoot||G.paused) return;
  const sx=GW/2, sy=GH-SHOOT_H-R-4;
  drawBubble3D(gx,sx,sy,R,G.shooter,1,true);
}

function drawAimLine(){
  if(!G.hasAim||!G.canShoot||G.paused) return;
  const sx=GW/2, sy=GH-SHOOT_H-R-4;
  const dx=G.aimX-sx, dy=G.aimY-sy;
  if(dy>-10) return;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const vx=dx/len, vy=dy/len;

  gx.save();
  gx.setLineDash([8,10]);
  gx.lineWidth=1.5;

  let cx=sx,cy=sy,cvx=vx,cvy=vy;
  let totalLen=0;
  const maxLen=GH*.7;

  // Draw up to 2 bounces
  for(let seg=0;seg<2;seg++){
    const segMax=maxLen-totalLen;
    // Find wall bounce or ceiling
    let tWall=Infinity, bounceLeft=false;
    if(cvx<-.001){tWall=-(cx-R)/cvx; bounceLeft=true;}
    else if(cvx>.001){tWall=(GW-R-cx)/cvx; bounceLeft=false;}
    const tCeil=(HUD_H+R-cy)/cvy;
    const tMax=Math.min(segMax/1,1000);

    let endX,endY,hit='none';
    if(tCeil>0&&tCeil<tWall&&tCeil*1<segMax){endX=cx+cvx*tCeil;endY=cy+cvy*tCeil;hit='ceil';}
    else if(tWall>0&&tWall<segMax){endX=cx+cvx*tWall;endY=cy+cvy*tWall;hit='wall';}
    else{endX=cx+cvx*segMax;endY=cy+cvy*segMax;hit='none';}

    const grad=gx.createLinearGradient(cx,cy,endX,endY);
    grad.addColorStop(0,`rgba(255,255,255,${.7-seg*.3})`);
    grad.addColorStop(1,`rgba(255,255,255,${.15-seg*.05})`);
    gx.strokeStyle=grad;
    gx.beginPath(); gx.moveTo(cx,cy); gx.lineTo(endX,endY); gx.stroke();

    if(hit==='none'||hit==='ceil') break;
    // Bounce
    cx=endX; cy=endY;
    cvx*=-1;
    totalLen+=Math.sqrt((endX-sx)**2+(endY-sy)**2);
  }

  gx.setLineDash([]);
  // Arrowhead
  const ax=sx+vx*60, ay=sy+vy*60;
  gx.save(); gx.translate(ax,ay); gx.rotate(Math.atan2(vy,vx)+Math.PI/2);
  gx.beginPath(); gx.moveTo(0,-9); gx.lineTo(6,4); gx.lineTo(-6,4); gx.closePath();
  gx.fillStyle='rgba(255,255,255,.5)'; gx.fill(); gx.restore();
  gx.restore();
}

function drawDangerLine(){
  // Show warning line when grid is getting close to bottom
  if(G.grid.length===0) return;
  const {topY}=layout();
  const lastRowY = topY + G.grid.length*ROW_H;
  const dangerY = GH - SHOOT_H - R*4;
  if(lastRowY > dangerY*.75){
    const alpha=Math.min(1,(lastRowY-dangerY*.75)/(dangerY*.25));
    gx.save();
    gx.setLineDash([6,8]);
    gx.strokeStyle=`rgba(255,60,60,${alpha*.5})`;
    gx.lineWidth=1.5;
    gx.beginPath(); gx.moveTo(0,dangerY); gx.lineTo(GW,dangerY); gx.stroke();
    gx.restore();
  }
}

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
function loop(now){
  if(!G.running) return;
  G.animId=requestAnimationFrame(loop);
  const dt=Math.min((now-G.last)/1000,.05);
  G.last=now;
  if(!G.paused) update(dt);

  gx.clearRect(0,0,GW,GH);
  drawDangerLine();
  drawGrid();
  drawBullet();
  drawShooterOnCanvas();
  drawAimLine();
}

function update(dt){
  if(!G.bullet) return;
  const spd=900;
  G.bullet.x+=G.bullet.vx*spd*dt*60/60;
  G.bullet.y+=G.bullet.vy*spd*dt*60/60;

  // Wall bounce
  if(G.bullet.x-R<0){G.bullet.x=R;G.bullet.vx*=-1;}
  if(G.bullet.x+R>GW){G.bullet.x=GW-R;G.bullet.vx*=-1;}

  // Hit ceiling
  if(G.bullet.y-R<=HUD_H+R){
    snapBubble();return;
  }

  // Hit any grid bubble
  for(let row=0;row<G.grid.length;row++){
    if(!G.grid[row]) continue;
    for(let col=0;col<G.grid[row].length;col++){
      const b=G.grid[row][col];
      if(!b||!b.alive) continue;
      const {x,y}=bubblePos(row,col);
      const dx=G.bullet.x-x,dy=G.bullet.y-y;
      if(dx*dx+dy*dy<(R*2-.5)**2){
        snapBubble();return;
      }
    }
  }
}

// Snap bullet to nearest grid slot
function snapBubble(){
  if(!G.bullet) return;
  const bx=G.bullet.x, by=G.bullet.y;
  const bcol=G.bullet.col;
  G.bullet=null;

  // Find closest empty slot
  const {topY,offX}=layout();
  let bestRow=-1,bestCol=-1,bestDist=Infinity;

  // Check existing rows and one row above grid
  const checkRows=G.grid.length+1;
  for(let row=0;row<checkRows;row++){
    const isOdd=row%2===1;
    const cnt=isOdd?COLS-1:COLS;
    for(let col=0;col<cnt;col++){
      // Skip occupied
      if(G.grid[row]&&G.grid[row][col]&&G.grid[row][col].alive) continue;
      const x=offX+col*R*2+(isOdd?R:0);
      const y=topY+row*ROW_H+R;
      const dx=bx-x,dy=by-y;
      const dist=dx*dx+dy*dy;
      if(dist<bestDist){bestDist=dist;bestRow=row;bestCol=col;}
    }
  }

  if(bestRow<0){G.canShoot=true;nextBubble();return;}

  // Place bubble
  while(G.grid.length<=bestRow) G.grid.push([]);
  if(!G.grid[bestRow]) G.grid[bestRow]=[];
  G.grid[bestRow][bestCol]={col:bcol,alive:true};

  G.shootCount++;

  // Burst effect at snap position
  const {x:sx,y:sy}=bubblePos(bestRow,bestCol);
  addBurst(sx,sy,bcol,6);

  // Check matches
  const matched=findMatches(bestRow,bestCol,bcol);
  if(matched.length>=3){
    // Pop them
    let total=0;
    for(const [r,c] of matched){
      if(G.grid[r]&&G.grid[r][c]&&G.grid[r][c].alive){
        const {x,y}=bubblePos(r,c);
        addBurst(x,y,G.grid[r][c].col,10);
        G.grid[r][c].alive=false;
        total++;
      }
    }
    const pts=total*100*(total>=6?3:total>=4?2:1);
    G.score+=pts;
    sfxMatch(total);
    showToast(total>=6?`🔥 MEGA! +${pts}`:total>=4?`💥 COMBO! +${pts}`:`✨ +${pts}`);

    // Drop floating bubbles
    const floaters=findFloating();
    for(const [r,c] of floaters){
      if(G.grid[r]&&G.grid[r][c]&&G.grid[r][c].alive){
        const {x,y}=bubblePos(r,c);
        addBurst(x,y,G.grid[r][c].col,6);
        G.grid[r][c].alive=false;
        G.score+=50;
      }
    }
    sfxMatch(floaters.length);
  } else {
    sfxInsert();
    // Push grid down every N misses
    if(G.shootCount%8===0) pushGridDown();
  }

  updateHUD();

  // Win check — all alive bubbles cleared
  if(countAlive()===0){endGame(true);return;}

  // Lose check — any bubble below danger line
  for(let row=0;row<G.grid.length;row++){
    if(!G.grid[row]) continue;
    for(let col=0;col<G.grid[row].length;col++){
      const b=G.grid[row][col];
      if(!b||!b.alive) continue;
      const {y}=bubblePos(row,col);
      if(y+R>GH-SHOOT_H-R){endGame(false);return;}
    }
  }

  G.canShoot=true;
  nextBubble();
}

function pushGridDown(){
  // Add a new row at top
  const cols=COLORS.slice(0,G.activeStage.colorCount);
  const isOdd=0%2===1;
  const cnt=COLS;
  const newRow=[];
  for(let col=0;col<cnt;col++) newRow.push({col:cols[Math.floor(Math.random()*cols.length)],alive:true});
  G.grid.unshift(newRow);
  showToast('⬇️ Grid pushed down!');
}

function countAlive(){
  let c=0;
  for(const row of G.grid) if(row) for(const b of row) if(b&&b.alive) c++;
  return c;
}

// BFS — find connected same-color bubbles
function findMatches(startRow,startCol,targetCol){
  const visited=new Set();
  const queue=[[startRow,startCol]];
  const result=[];
  while(queue.length){
    const [r,c]=queue.shift();
    const key=`${r},${c}`;
    if(visited.has(key)) continue;
    visited.add(key);
    if(!G.grid[r]||!G.grid[r][c]||!G.grid[r][c].alive) continue;
    if(G.grid[r][c].col.id!==targetCol.id) continue;
    result.push([r,c]);
    for(const [nr,nc] of getNeighbors(r,c)) queue.push([nr,nc]);
  }
  return result;
}

// Find bubbles not connected to top row
function findFloating(){
  // Mark all reachable from row 0
  const reachable=new Set();
  const queue=[];
  for(let col=0;col<(G.grid[0]?.length||0);col++){
    if(G.grid[0]&&G.grid[0][col]&&G.grid[0][col].alive) queue.push([0,col]);
  }
  while(queue.length){
    const [r,c]=queue.shift();
    const key=`${r},${c}`;
    if(reachable.has(key)) continue;
    reachable.add(key);
    for(const [nr,nc] of getNeighbors(r,c)){
      if(G.grid[nr]&&G.grid[nr][nc]&&G.grid[nr][nc].alive&&!reachable.has(`${nr},${nc}`)) queue.push([nr,nc]);
    }
  }
  // Collect all alive not in reachable
  const floaters=[];
  for(let r=0;r<G.grid.length;r++){
    if(!G.grid[r]) continue;
    for(let c=0;c<G.grid[r].length;c++){
      if(G.grid[r][c]&&G.grid[r][c].alive&&!reachable.has(`${r},${c}`)) floaters.push([r,c]);
    }
  }
  return floaters;
}

// Hex grid neighbors
function getNeighbors(row,col){
  const isOdd=row%2===1;
  const maxCol=isOdd?COLS-2:COLS-1;
  const neighbors=[];
  // Same row
  if(col>0) neighbors.push([row,col-1]);
  if(col<maxCol) neighbors.push([row,col+1]);
  // Row above
  if(row>0){
    const prevOdd=(row-1)%2===1;
    if(isOdd){neighbors.push([row-1,col]);neighbors.push([row-1,col+1]);}
    else{if(col>0)neighbors.push([row-1,col-1]);neighbors.push([row-1,col]);}
  }
  // Row below
  if(row<G.grid.length-1){
    const nextOdd=(row+1)%2===1;
    if(isOdd){neighbors.push([row+1,col]);if(col>0)neighbors.push([row+1,col-1]);}
    else{neighbors.push([row+1,col]);neighbors.push([row+1,col+1]);}
  }
  return neighbors;
}

function nextBubble(){
  G.shooter=G.next;
  G.next=randBubble(G.activeStage);
  updateShooterUI();
}

// ─────────────────────────────────────────────
// SHOOT
// ─────────────────────────────────────────────
function shoot(){
  if(!G.canShoot||!G.shooter||G.bullet||G.paused||!G.hasAim) return;
  const sx=GW/2, sy=GH-SHOOT_H-R-4;
  const dx=G.aimX-sx, dy=G.aimY-sy;
  if(dy>-15) return;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  G.bullet={x:sx,y:sy,vx:dx/len,vy:dy/len,col:G.shooter};
  G.canShoot=false;
  sfxShoot();
}

function swapBubbles(){
  [G.shooter,G.next]=[G.next,G.shooter];
  updateShooterUI();
  sfxShoot();
}

// ─────────────────────────────────────────────
// END GAME
// ─────────────────────────────────────────────
function endGame(won){
  G.running=false;
  cancelAnimationFrame(G.animId);
  if(won){
    sfxWin();
    const left=countAlive();
    const stars=G.score>5000?3:G.score>2500?2:1;
    const prev=save.stars[G.stageIdx+1]||0;
    if(stars>prev) save.stars[G.stageIdx+1]=stars;
    const prevS=save.scores[G.stageIdx+1]||0;
    if(G.score>prevS) save.scores[G.stageIdx+1]=G.score;
    save.done.add(G.stageIdx+1);
    save.total+=G.score;
    doSave();
    const scb=document.getElementById('scb');
    document.getElementById('scb-stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
    document.getElementById('scb-score').textContent=G.score.toLocaleString();
    scb.classList.add('show');
    setTimeout(()=>{scb.classList.remove('show');showResult(true,stars);},1800);
  } else {
    sfxLose(); showResult(false,0);
  }
}

function showResult(won,stars){
  document.getElementById('r-icon').textContent=won?'🏆':'💔';
  document.getElementById('r-title').textContent=won?'Victory!':'Game Over';
  document.getElementById('r-sub').textContent=won?'All cleared! Amazing!':'Bubbles reached bottom!';
  document.getElementById('r-stars').textContent=won?'★'.repeat(stars)+'☆'.repeat(3-stars):'☆☆☆';
  document.getElementById('r-score').textContent=G.score.toLocaleString();
  document.getElementById('r-next').style.display=(won&&G.stageIdx<99)?'block':'none';
  document.getElementById('result-ov').classList.add('show');
}

// ─────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────
let AC=null;
function initAudio(){
  if(AC) return;
  try{AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}catch(e){AC=null;}
}
function tone(freq,type,dur,vol,when){
  if(!AC) return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,when);
  g.gain.linearRampToValueAtTime(vol,when+.02);
  g.gain.exponentialRampToValueAtTime(.001,when+dur);
  o.start(when);o.stop(when+dur+.05);
}
function sfxShoot(){if(!AC)return;const n=AC.currentTime;tone(440,'square',.05,.06,n);tone(660,'square',.04,.04,n+.03);}
function sfxInsert(){if(!AC)return;tone(300+Math.random()*150,'sine',.08,.04,AC.currentTime);}
function sfxMatch(c){
  if(!AC)return;const n=AC.currentTime;
  [440,554,659,784].slice(0,Math.min(c,4)).forEach((f,i)=>tone(f,'sine',.18,.1,n+i*.07));
}
function sfxWin(){if(!AC)return;const n=AC.currentTime;[523,659,784,1047,1319].forEach((f,i)=>tone(f,'sine',.4,.12,n+i*.1));}
function sfxLose(){if(!AC)return;const n=AC.currentTime;[330,247,185,147].forEach((f,i)=>tone(f,'sine',.5,.12,n+i*.15));}

// ─────────────────────────────────────────────
// UI UPDATES
// ─────────────────────────────────────────────
function bubble3DCSS(col){
  return `radial-gradient(circle at 34% 28%, ${col.hi} 0%, ${col.mid} 45%, ${col.lo} 100%)`;
}
function updateShooterUI(){
  const sm=document.getElementById('shooter-ball');
  const nb=document.getElementById('next-ball');
  if(G.shooter){sm.style.background=bubble3DCSS(G.shooter);sm.style.boxShadow=`0 0 20px ${G.shooter.sh},0 8px 20px rgba(0,0,0,.5)`;}
  if(G.next){nb.style.background=bubble3DCSS(G.next);nb.style.boxShadow=`0 4px 12px rgba(0,0,0,.5),0 0 10px ${G.next.sh}`;}
}
function updateHUD(){
  document.getElementById('h-stage').textContent=G.stageIdx+1;
  document.getElementById('h-score').textContent=G.score>=1000?Math.floor(G.score/100)/10+'k':G.score;
  document.getElementById('h-left').textContent=countAlive();
}

// INPUT
// ─────────────────────────────────────────────
function setAim(cx,cy){G.aimX=cx;G.aimY=cy;G.hasAim=true;}
gc.addEventListener('mousemove',e=>setAim(e.clientX,e.clientY));
gc.addEventListener('mousedown',e=>{setAim(e.clientX,e.clientY);shoot();});
gc.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];setAim(t.clientX,t.clientY);},{passive:false});
gc.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];setAim(t.clientX,t.clientY);},{passive:false});
gc.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];setAim(t.clientX,t.clientY);shoot();},{passive:false});

document.getElementById('shooter-ball').addEventListener('click',()=>{if(G.hasAim)shoot();else showToast('Pehle aim karo!');});
document.getElementById('btn-swap').addEventListener('click',()=>{if(G.running&&!G.paused)swapBubbles();});

document.getElementById('btn-pause').addEventListener('click',()=>{

  document.getElementById('btn-pause').textContent=G.paused?'▶':'⏸';

});
document.getElementById('btn-back-game').addEventListener('click',()=>{
  if(confirm('Stage chhod kar map par jaana chahte ho?')){

  }
});

// ─────────────────────────────────────────────
// LAUNCH
// ─────────────────────────────────────────────
function launchGame(idx){
  initAudio();
  showScreen('game');
  resizeGame();
  initStage(idx);
  G.running=true;
  G.last=performance.now();
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
// SCREEN NAV
// ─────────────────────────────────────────────
const SCREENS={home:'s-home',stages:'s-stages',game:'s-game'};
function showScreen(id){
  Object.values(SCREENS).forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById(SCREENS[id]).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===id));
  document.getElementById('bnav').style.display=id==='game'?'none':'flex';
  if(id==='stages') renderStages();
  if(id==='home') renderHomeStats();
}

function renderHomeStats(){
  document.getElementById('hs-done').textContent=save.done.size;
  document.getElementById('hs-stars').textContent=Object.values(save.stars).reduce((a,b)=>a+b,0);
  const best=save.total;
  document.getElementById('hs-best').textContent=best>=1000?Math.floor(best/100)/10+'k':best;
}

// ─────────────────────────────────────────────
// STAGE MAP
// ─────────────────────────────────────────────
function renderStages(){
  document.getElementById('st-done').textContent=save.done.size;
  document.getElementById('st-stars').textContent=Object.values(save.stars).reduce((a,b)=>a+b,0);
  const best=save.total;
  document.getElementById('st-score').textContent=best>=1000?Math.floor(best/100)/10+'k':best;

  const wrap=document.getElementById('worlds-wrap');
  wrap.innerHTML='';

  WORLDS.forEach(w=>{
    const [s,e]=w.stages;
    const wDiv=document.createElement('div');

    const doneInWorld=[...save.done].filter(n=>n>=s&&n<=e).length;
    const hdr=document.createElement('div');
    hdr.className='world-hdr';
    hdr.style.background=w.color;
    hdr.style.border='1px solid rgba(255,255,255,.1)';
    hdr.style.borderRadius='12px';
    hdr.innerHTML=`<span class="world-hdr-icon">${w.emoji}</span><span class="world-hdr-name">${w.name}</span><span class="world-hdr-prog">${doneInWorld}/${e-s+1}</span>`;
    wDiv.appendChild(hdr);

    const grid=document.createElement('div');
    grid.className='stage-grid';

    for(let n=s;n<=e;n++){
      const isDone=save.done.has(n);
      const isOpen=!isDone&&(n===1||save.done.has(n-1));
      const isLock=!isDone&&!isOpen;
      const sc=stageConfig(n-1);
      const stars=save.stars[n]||0;

      const cell=document.createElement('div');
      cell.className='sc '+(isLock?'sc-lock':isDone?'sc-done':'sc-open');
      if(!isLock&&sc.type==='boss') cell.classList.add('sc-boss');

      const badge=sc.type==='boss'?'💀':sc.type==='secret'?'✨':'';
      const starStr=isDone?'★'.repeat(stars)+'☆'.repeat(3-stars):'';

      cell.innerHTML=`
        ${badge?`<div class="sc-badge">${badge}</div>`:''}
        ${isLock?'<div class="sc-lock-ico">🔒</div>':''}
        <div class="sc-num">${n}</div>
        ${starStr?`<div class="sc-stars">${starStr}</div>`:''}
      `;
      if(!isLock){
        cell.addEventListener('click',()=>openModal(n-1,sc,isDone,stars));
        cell.addEventListener('touchend',ev=>{ev.preventDefault();openModal(n-1,sc,isDone,stars);},{passive:false});
      }
      grid.appendChild(cell);
    }
    wDiv.appendChild(grid);
    wrap.appendChild(wDiv);
  });
}

// MODAL

let pendingIdx=0;
function openModal(idx,sc,done,stars){
  pendingIdx=idx;
  document.getElementById('m-title').textContent=`Stage ${idx+1} · ${sc.name}`;
  document.getElementById('m-world').textContent=`${sc.world.emoji} ${sc.world.name}`;
  document.getElementById('m-stars').textContent=done?'★'.repeat(stars)+'☆'.repeat(3-stars):'☆☆☆';
  document.getElementById('m-score').textContent=done?(save.scores[idx+1]||0).toLocaleString():'—';
  document.getElementById('m-diff').textContent=sc.diff;
  document.getElementById('m-rows').textContent=sc.rows;
  document.getElementById('m-hint').textContent='💡 '+sc.hint;
  document.getElementById('stage-modal').classList.add('open');
}
function closeModal(){document.getElementById('stage-modal').classList.remove('open');}
document.getElementById('stage-modal').addEventListener('click',e=>{if(e.target===document.getElementById('stage-modal'))closeModal();});
document.getElementById('btn-m-close').addEventListener('click',closeModal);
